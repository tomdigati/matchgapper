// AUTH HOOK

function useAuth() {
  const [session, setSession] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      if (session) fetchProfile(session.user.id);
      else setLoading(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      if (session) fetchProfile(session.user.id);
      else { setProfile(null); setLoading(false); }
    });
    return () => subscription.unsubscribe();
  }, []);

  async function fetchProfile(userId) {
    const { data, error } = await supabase
      .from("profiles")
      .select("*")
      .eq("id", userId)
      .single();
    if (data) setProfile(data);
    setLoading(false);
  }

  async function signIn(email, password) {
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    return { error };
  }

  async function signUp(email, password, fullName, role, club) {
    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: { data: { full_name: fullName, role: role, club: club } }
    });
    if (!error && data?.user) {
      await supabase.from("profiles").update({ role: role, club: club }).eq("id", data.user.id);
    }
    return { error };
  }

  async function signOut() {
    await supabase.auth.signOut();
    setSession(null);
    setProfile(null);
  }

  return { session, profile, loading, signIn, signUp, signOut, fetchProfile };
}

// SUPABASE PLAYERS DATA LAYER

function dbPlayerToApp(p) {
  return {
    id: p.id, name: p.name, ghin: p.ghin || "", courseHdcp: Number(p.course_hdcp) || 15,
    index: Number(p.index) || 15, phone: p.phone || "", email: p.email || "",
    status: p.status || "not_contacted", contactOwner: p.contact_owner || "",
    contactDate: p.contact_date || "",
    availability: { 1: p.availability_1 || "no", 2: p.availability_2 || "no", 3: p.availability_3 || "no" },
    locPref: { 1: p.loc_pref_1 || "", 2: p.loc_pref_2 || "", 3: p.loc_pref_3 || "" },
    notes: p.notes || "",
  };
}

function appPlayerToDb(p, club, userId) {
  return {
    club: club, name: p.name, ghin: p.ghin, course_hdcp: p.courseHdcp, index: p.index,
    phone: p.phone, email: p.email, status: p.status, contact_owner: p.contactOwner,
    contact_date: p.contactDate, availability_1: p.availability[1], availability_2: p.availability[2],
    availability_3: p.availability[3], loc_pref_1: p.locPref[1], loc_pref_2: p.locPref[2],
    loc_pref_3: p.locPref[3], notes: p.notes, created_by: userId,
  };
}

async function loadPlayersFromDb(club) {
  const { data, error } = await supabase.from("players").select("*").eq("club", club).order("course_hdcp");
  if (error) { console.error("Load players error:", error); return []; }
  return (data || []).map(dbPlayerToApp);
}

async function savePlayerToDb(player, club, userId) {
  const row = appPlayerToDb(player, club, userId);
  if (player.id && typeof player.id === "number" && player.id > 0) {
    // Check if it exists in DB
    const { data: existing } = await supabase.from("players").select("id").eq("id", player.id).single();
    if (existing) {
      const { error } = await supabase.from("players").update(row).eq("id", player.id);
      if (error) console.error("Update player error:", error);
      return player.id;
    }
  }
  // Insert new
  delete row.id;
  const { data, error } = await supabase.from("players").insert(row).select("id").single();
  if (error) { console.error("Insert player error:", error); return null; }
  return data?.id;
}

async function deletePlayerFromDb(playerId) {
  const { error } = await supabase.from("players").delete().eq("id", playerId);
  if (error) console.error("Delete player error:", error);
}

async function bulkInsertPlayers(players, club, userId) {
  const rows = players.map(p => {
    const row = appPlayerToDb(p, club, userId);
    delete row.id;
    return row;
  });
  const { data, error } = await supabase.from("players").insert(rows).select("id");
  if (error) { console.error("Bulk insert error:", error); return []; }
  return data || [];
}

// ONBOARDING WIZARD
// ═══════════════════════════════════════════════════════════════
function OnboardingWizard({ profile, session, onComplete }) {
  const [step, setStep] = useState(1); // 1=welcome, 2=upload, 3=review
  const [importedPlayers, setImportedPlayers] = useState([]);
  const [uploadMsg, setUploadMsg] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [saving, setSaving] = useState(false);

  const handleFileUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      if (!text) { setUploadMsg({ type: "error", msg: "Could not read file." }); return; }
      const parseCSVLine = (line) => { const result = []; let current = ""; let inQuotes = false; for (let i = 0; i < line.length; i++) { const ch = line[i]; if (ch === '"') { if (inQuotes && line[i+1] === '"') { current += '"'; i++; } else { inQuotes = !inQuotes; } } else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ""; } else { current += ch; } } result.push(current.trim()); return result; };
      const lines = text.trim().split("\n").map(l => parseCSVLine(l));
      if (lines.length < 2) { setUploadMsg({ type: "error", msg: "File appears empty." }); return; }
      const header = lines[0].map(h => h.toLowerCase().trim());
      const firstNameIdx = header.findIndex(h => h === "first name" || h === "firstname" || h === "first");
      const lastNameIdx = header.findIndex(h => h === "last name" || h === "lastname" || h === "last");
      const nameIdx = header.findIndex(h => h === "name" || h === "player" || h === "player name");
      const ghinIdx = header.findIndex(h => h.includes("ghin"));
      const hdcpIdx = header.findIndex(h => h.includes("hdcp") || h.includes("handicap") || h.includes("course"));
      const indexIdx = header.findIndex(h => h.includes("index"));
      const phoneIdx = header.findIndex(h => h.includes("phone") || h.includes("cell") || h.includes("mobile"));
      const emailIdx = header.findIndex(h => h.includes("email") || h.includes("e-mail"));
      const hasSeparateNames = firstNameIdx > -1 && lastNameIdx > -1;
      if (!hasSeparateNames && nameIdx === -1) { setUploadMsg({ type: "error", msg: "Could not find name columns. Use 'First Name' and 'Last Name' columns, or a single 'Name' column." }); return; }
      const getName = (row) => {
        if (hasSeparateNames) {
          const first = (row[firstNameIdx] || "").trim();
          const last = (row[lastNameIdx] || "").trim();
          return last && first ? `${last}, ${first}` : last || first || "Unknown";
        }
        return row[nameIdx] || "Unknown";
      };
      const hasData = (row) => hasSeparateNames ? ((row[firstNameIdx] || "").trim() || (row[lastNameIdx] || "").trim()) : (row[nameIdx] || "").trim();
      const players = lines.slice(1).filter(row => hasData(row)).map((row, i) => ({
        id: -(i + 1),
        name: getName(row),
        ghin: ghinIdx > -1 ? (row[ghinIdx] || "") : "",
        courseHdcp: hdcpIdx > -1 ? (parseFloat(row[hdcpIdx]) || 15) : 15,
        index: indexIdx > -1 ? (parseFloat(row[indexIdx]) || 15) : 15,
        phone: phoneIdx > -1 ? (row[phoneIdx] || "") : "",
        email: emailIdx > -1 ? (row[emailIdx] || "") : "",
        status: "not_contacted", contactOwner: "", contactDate: "",
        availability: { 1: "no", 2: "no", 3: "no" },
        locPref: { 1: "", 2: "", 3: "" }, notes: "",
      }));
      setImportedPlayers(players);
      setUploadMsg({ type: "success", msg: `Found ${players.length} players in ${file.name}` });
      setStep(3);
    } catch (err) {
      setUploadMsg({ type: "error", msg: "Error reading file: " + err.message });
    }
    e.target.value = "";
  };

  const addManualPlayer = () => {
    const tempId = -(importedPlayers.length + 1);
    setImportedPlayers(prev => [...prev, {
      id: tempId, name: "Last, First", ghin: "", courseHdcp: 15, index: 15.0,
      phone: "", email: "", status: "not_contacted", contactOwner: "", contactDate: "",
      availability: { 1: "no", 2: "no", 3: "no" }, locPref: { 1: "", 2: "", 3: "" }, notes: "",
    }]);
    setEditingId(tempId);
  };

  const updatePlayer = (id, field, value) => {
    setImportedPlayers(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
  };

  const removePlayer = (id) => {
    setImportedPlayers(prev => prev.filter(p => p.id !== id));
  };

  const handleFinish = async () => {
    if (importedPlayers.length === 0) {
      // Mark onboarded even with no players
      await supabase.from("profiles").update({ onboarded: true }).eq("id", session.user.id);
      onComplete();
      return;
    }
    setSaving(true);
    await bulkInsertPlayers(importedPlayers, profile.club, session.user.id);
    await supabase.from("profiles").update({ onboarded: true }).eq("id", session.user.id);
    setSaving(false);
    onComplete();
  };

  return (
    <div style={{ fontFamily: "'Poppins', 'Segoe UI', -apple-system, sans-serif", background: "#eef2f7", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
      <div style={{ width: "100%", maxWidth: 800, background: "#fff", borderRadius: 16, boxShadow: "0 8px 32px rgba(0,0,0,0.12)", overflow: "hidden" }}>
        {/* Header */}
        <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", padding: "24px 32px", borderBottom: "3px solid #7dd3fc" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ width: 42, height: 42, borderRadius: "50%", background: "linear-gradient(135deg, #7dd3fc, #38bdf8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, fontWeight: 600, color: "#0f172a" }}>M</div>
              <div>
                <div style={{ color: "#7dd3fc", fontSize: 18, fontWeight: 600 }}>MatchGapper Setup</div>
                <div style={{ color: "#94a3b8", fontSize: 11 }}>{profile.club}</div>
              </div>
            </div>
            {/* Step indicator */}
            <div style={{ display: "flex", gap: 8 }}>
              {[1, 2, 3].map(s => (
                <div key={s} style={{ width: 32, height: 32, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 600, background: step >= s ? "#7dd3fc" : "#334155", color: step >= s ? "#0f172a" : "#64748b", transition: "all 0.2s" }}>{s}</div>
              ))}
            </div>
          </div>
        </div>

        {/* Step 1: Welcome */}
        {step === 1 && (
          <div style={{ padding: "40px 32px", textAlign: "center" }}>
            <div style={{ fontSize: 28, fontWeight: 600, color: "#0f172a", marginBottom: 8 }}>Welcome, {profile.full_name?.split(" ")[0] || "Captain"}!</div>
            <div style={{ fontSize: 15, color: "#64748b", marginBottom: 32, maxWidth: 500, margin: "0 auto 32px" }}>
              Let's get your {profile.club} roster set up for the BMW GAP Team Matches. You can upload a CSV file or add players manually.
            </div>
            <div style={{ background: "#f5f7fb", borderRadius: 12, padding: 24, maxWidth: 400, margin: "0 auto", border: "1px solid #e2e8f0" }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#0f172a", marginBottom: 4 }}>Your Details</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 16px", fontSize: 13, textAlign: "left" }}>
                <span style={{ color: "#64748b" }}>Name:</span><span style={{ fontWeight: 600 }}>{profile.full_name}</span>
                <span style={{ color: "#64748b" }}>Club:</span><span style={{ fontWeight: 600 }}>{profile.club}</span>
                <span style={{ color: "#64748b" }}>Role:</span><span style={{ fontWeight: 600 }}>{ROLE_CONFIG[profile.role]?.label}</span>
              </div>
            </div>
            <button onClick={() => setStep(2)} style={{ marginTop: 32, padding: "14px 40px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #0f172a, #1e3a5f)", color: "#7dd3fc", fontWeight: 600, fontSize: 16, cursor: "pointer" }}>
              Get Started
            </button>
          </div>
        )}

        {/* Step 2: Upload */}
        {step === 2 && (
          <div style={{ padding: "32px" }}>
            <div style={{ fontSize: 22, fontWeight: 600, color: "#0f172a", marginBottom: 4 }}>Import Your Roster</div>
            <div style={{ fontSize: 13, color: "#64748b", marginBottom: 24 }}>Upload a CSV or Excel file with your player list, or skip and add players manually.</div>

            {/* Column requirements */}
            <div style={{ background: "#f0f9ff", border: "1px solid #bae6fd", borderRadius: 10, padding: 16, marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: "#0369a1", marginBottom: 10 }}>Column Requirements</div>
              <div style={{ fontSize: 12, color: "#0f172a", lineHeight: 1.8 }}>
                <div>Your file should have a <strong>header row</strong> with the following column names:</div>
                <table style={{ width: "100%", fontSize: 11, marginTop: 8, borderCollapse: "collapse" }}>
                  <thead><tr style={{ borderBottom: "1px solid #bae6fd" }}>
                    <th style={{ textAlign: "left", padding: "4px 8px", color: "#0369a1", fontWeight: 600 }}>Column</th>
                    <th style={{ textAlign: "left", padding: "4px 8px", color: "#0369a1", fontWeight: 600 }}>Status</th>
                    <th style={{ textAlign: "left", padding: "4px 8px", color: "#0369a1", fontWeight: 600 }}>Format</th>
                  </tr></thead>
                  <tbody>
                    <tr><td style={{ padding: "3px 8px", fontWeight: 600 }}>First Name</td><td style={{ padding: "3px 8px", color: "#dc2626", fontWeight: 600 }}>Required</td><td style={{ padding: "3px 8px", color: "#64748b" }}>e.g. James</td></tr>
                    <tr style={{ background: "#f8fafc" }}><td style={{ padding: "3px 8px", fontWeight: 600 }}>Last Name</td><td style={{ padding: "3px 8px", color: "#dc2626", fontWeight: 600 }}>Required</td><td style={{ padding: "3px 8px", color: "#64748b" }}>e.g. Anderson</td></tr>
                    <tr><td style={{ padding: "3px 8px", fontWeight: 600 }}>GHIN</td><td style={{ padding: "3px 8px", color: "#f59e0b", fontWeight: 600 }}>Recommended</td><td style={{ padding: "3px 8px", color: "#64748b" }}>7-digit GHIN number</td></tr>
                    <tr style={{ background: "#f8fafc" }}><td style={{ padding: "3px 8px", fontWeight: 600 }}>Handicap</td><td style={{ padding: "3px 8px", color: "#f59e0b", fontWeight: 600 }}>Recommended</td><td style={{ padding: "3px 8px", color: "#64748b" }}>Course handicap (e.g. 8)</td></tr>

                    <tr style={{ background: "#f8fafc" }}><td style={{ padding: "3px 8px", fontWeight: 600 }}>Phone</td><td style={{ padding: "3px 8px", color: "#94a3b8" }}>Optional</td><td style={{ padding: "3px 8px", color: "#64748b" }}>e.g. 610-555-0101</td></tr>
                    <tr><td style={{ padding: "3px 8px", fontWeight: 600 }}>Email</td><td style={{ padding: "3px 8px", color: "#94a3b8" }}>Optional</td><td style={{ padding: "3px 8px", color: "#64748b" }}>e.g. james@email.com</td></tr>

            {/* Upload area */}
            <label style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 20px", border: "3px dashed #7dd3fc", borderRadius: 12, background: "#f8fafc", cursor: "pointer", transition: "all 0.2s", marginBottom: 16 }}>

              <input type="file" accept=".csv,.xlsx,.xls" onChange={handleFileUpload} style={{ display: "none" }} />

            {uploadMsg && (

            </div>

            <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #d1d9e6", overflow: "hidden", maxHeight: 400, overflowY: "auto", marginBottom: 20 }}>

                      </td>
                      <td style={{ padding: "6px 8px", color: "#64748b" }}>
                        {editingId === p.id ? <input type="number" step="0.1" value={p.index} onChange={e => updatePlayer(p.id, "index", parseFloat(e.target.value) || 0)} style={{ fontSize: 11, padding: "4px", border: "1px solid #38bdf8", borderRadius: 4, width: 50, background: "#eff6ff", textAlign: "center" }} />
                          : <span onClick={() => setEditingId(p.id)} style={{ cursor: "pointer" }}>{p.index}</span>}
                      </td>
                      <td style={{ padding: "6px 8px", fontFamily: "monospace", fontSize: 10 }}>
                        {editingId === p.id ? <input value={p.ghin} onChange={e => updatePlayer(p.id, "ghin", e.target.value)} style={{ fontSize: 10, padding: "4px", border: "1px solid #38bdf8", borderRadius: 4, width: 70, background: "#eff6ff", fontFamily: "monospace" }} />
                          : <span onClick={() => setEditingId(p.id)} style={{ cursor: "pointer" }}>{p.ghin || "—"}</span>}
                      </td>
                      <td style={{ padding: "6px 8px", fontSize: 11 }}>
                        {editingId === p.id ? <input value={p.phone} onChange={e => updatePlayer(p.id, "phone", e.target.value)} style={{ fontSize: 11, padding: "4px", border: "1px solid #38bdf8", borderRadius: 4, width: 100, background: "#eff6ff" }} />
                          : <span onClick={() => setEditingId(p.id)} style={{ cursor: "pointer", color: "#64748b" }}>{p.phone || "—"}</span>}
                      </td>
                      <td style={{ padding: "6px 8px", fontSize: 11 }}>
                        {editingId === p.id ? <input value={p.email} onChange={e => updatePlayer(p.id, "email", e.target.value)} style={{ fontSize: 11, padding: "4px", border: "1px solid #38bdf8", borderRadius: 4, width: 130, background: "#eff6ff" }} />
                          : <span onClick={() => setEditingId(p.id)} style={{ cursor: "pointer", color: "#64748b" }}>{p.email || "—"}</span>}
                      </td>
                      <td style={{ padding: "6px 8px" }}>
                        <div style={{ display: "flex", gap: 4 }}>
                          {editingId === p.id && <button onClick={() => setEditingId(null)} style={{ fontSize: 9, padding: "3px 8px", borderRadius: 4, border: "none", background: "#16a34a", color: "#fff", fontWeight: 600, cursor: "pointer" }}>Done</button>}
                          <button onClick={() => removePlayer(p.id)} style={{ fontSize: 9, padding: "3px 6px", borderRadius: 4, border: "1px solid #fca5a5", background: "#fff5f5", color: "#dc2626", cursor: "pointer" }}>Remove</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <button onClick={() => setStep(2)} style={{ padding: "10px 24px", borderRadius: 8, border: "1px solid #c1cad8", background: "#fff", color: "#64748b", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>Back</button>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                {importedPlayers.length === 0 && <span style={{ fontSize: 12, color: "#94a3b8" }}>You can add players later from the Roster tab</span>}
                <button onClick={handleFinish} disabled={saving}
                  style={{ padding: "12px 32px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #0f172a, #1e3a5f)", color: "#7dd3fc", fontWeight: 600, fontSize: 15, cursor: saving ? "wait" : "pointer", opacity: saving ? 0.7 : 1 }}>
                  {saving ? "Saving..." : importedPlayers.length > 0 ? `Save ${importedPlayers.length} Players & Continue` : "Skip & Continue"}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// CLUB REGISTRATION SCREEN (PGA Pro @pga.com only)
// ═══════════════════════════════════════════════════════════════
function ClubRegistration({ onBack }) {
  const [proName, setProName] = useState("");
  const [proEmail, setProEmail] = useState("");
  const [clubName, setClubName] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState(null);
  const [success, setSuccess] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(null);
    if (!proEmail.toLowerCase().endsWith("@pga.com")) {
      setError("Club registration requires a @pga.com email address. Only PGA professionals can register clubs.");
      return;
    }
    if (!clubName) { setError("Please select your club."); return; }
    setSubmitting(true);
    // Check if club already registered
    const { data: existing } = await supabase.from("clubs").select("id, verified").eq("name", clubName);
    if (existing && existing.length > 0) {
      setError(`${clubName} is already registered. Contact your club admin for an invitation.`);
      setSubmitting(false);
      return;
    }
    const { error: insertErr } = await supabase.from("clubs").insert({
      name: clubName, pro_name: proName, pro_email: proEmail.toLowerCase()
    });
    if (insertErr) {
      setError("Registration failed: " + insertErr.message);
    } else {
      setSuccess(true);
    }
    setSubmitting(false);
  };

  if (success) {
    return (
      <div style={{ fontFamily: "'Poppins', 'Segoe UI', -apple-system, sans-serif", background: "#eef2f7", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
        <div style={{ width: 460, background: "#fff", borderRadius: 16, boxShadow: "0 8px 32px rgba(0,0,0,0.12)", overflow: "hidden" }}>
          <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", padding: "32px", textAlign: "center", borderBottom: "3px solid #16a34a" }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>&#9989;</div>
            <div style={{ color: "#7dd3fc", fontSize: 22, fontWeight: 600 }}>Club Registered!</div>
          </div>
          <div style={{ padding: "32px", textAlign: "center" }}>
            <p style={{ fontSize: 15, color: "#0f172a", fontWeight: 600, marginBottom: 8 }}>{clubName}</p>
            <p style={{ fontSize: 13, color: "#64748b", marginBottom: 24 }}>
              A verification email will be sent to <strong>{proEmail}</strong>. Once verified, you'll receive an admin invitation link to set up your account and start inviting captains.
            </p>
            <button onClick={onBack} style={{ padding: "12px 32px", borderRadius: 8, border: "none", background: "linear-gradient(135deg, #0f172a, #1e3a5f)", color: "#7dd3fc", fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
              Back to Sign In
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ fontFamily: "'Poppins', 'Segoe UI', -apple-system, sans-serif", background: "#eef2f7", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
      <div style={{ width: 460, background: "#fff", borderRadius: 16, boxShadow: "0 8px 32px rgba(0,0,0,0.12)", overflow: "hidden" }}>
        <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", padding: "32px 32px 24px", textAlign: "center", borderBottom: "3px solid #7dd3fc" }}>
          <div style={{ width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg, #7dd3fc, #38bdf8)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 600, color: "#0f172a", marginBottom: 12 }}>M</div>
          <div style={{ color: "#7dd3fc", fontSize: 22, fontWeight: 600 }}>Register Your Club</div>
          <div style={{ color: "#94a3b8", fontSize: 12, marginTop: 4 }}>PGA Professional verification required</div>
        </div>
        <form onSubmit={handleSubmit} style={{ padding: "28px 32px" }}>
          <div style={{ background: "#fef3c7", border: "1px solid #fbbf24", borderRadius: 10, padding: 14, marginBottom: 20, fontSize: 12, color: "#92400e" }}>
            <div style={{ fontWeight: 600, marginBottom: 4 }}>PGA Pro Authorization Required</div>
            Only PGA professionals with a <strong>@pga.com</strong> email address can register a club. Once registered, the pro can invite captains and vice-captains.
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 4, display: "block" }}>PGA Professional Name</label>
            <input value={proName} onChange={e => setProName(e.target.value)} placeholder="Mike Dever" required
              style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #c1cad8", fontSize: 14, background: "#f5f7fb", outline: "none", boxSizing: "border-box" }} />
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 4, display: "block" }}>PGA Email Address</label>
            <input type="email" value={proEmail} onChange={e => setProEmail(e.target.value)} placeholder="mdever@pga.com" required
              style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: `1px solid ${proEmail && !proEmail.toLowerCase().endsWith("@pga.com") ? "#dc2626" : "#c1cad8"}`, fontSize: 14, background: "#f5f7fb", outline: "none", boxSizing: "border-box" }} />
            {proEmail && !proEmail.toLowerCase().endsWith("@pga.com") && (
              <div style={{ fontSize: 11, color: "#dc2626", marginTop: 4, fontWeight: 600 }}>Must be a @pga.com email address</div>
            )}
          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 4, display: "block" }}>Club</label>
            <ClubSearchDropdown value={clubName} onChange={setClubName} placeholder="Search 334 GAP member clubs..." />
            {clubName && <div style={{ fontSize: 11, color: "#16a34a", marginTop: 4, fontWeight: 600 }}>{clubName}</div>}
          </div>
          {error && <div style={{ background: "#fee2e2", color: "#991b1b", padding: "10px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600, marginBottom: 14 }}>{error}</div>}
          <button type="submit" disabled={submitting}
            style={{ width: "100%", padding: "12px", borderRadius: 8, border: "none", background: "linear-gradient(135deg, #0f172a, #1e3a5f)", color: "#7dd3fc", fontWeight: 600, fontSize: 15, cursor: submitting ? "wait" : "pointer", opacity: submitting ? 0.7 : 1 }}>
            {submitting ? "Registering..." : "Register Club"}
          </button>
          <button type="button" onClick={onBack}
            style={{ width: "100%", padding: "10px", borderRadius: 8, border: "1px solid #c1cad8", background: "#fff", color: "#64748b", fontWeight: 600, fontSize: 13, cursor: "pointer", marginTop: 10 }}>
            Back to Sign In
          </button>
        </form>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// INVITE SIGNUP SCREEN (accessed via ?invite=TOKEN)
// ═══════════════════════════════════════════════════════════════
function InviteSignup({ invite, onSignUp, onBack }) {
  const [fullName, setFullName] = useState("");
  const [email, setEmail] = useState(invite.email || "");
  const [password, setPassword] = useState("");
  const [confirmPassword, setConfirmPassword] = useState("");
  const [showPassword, setShowPassword] = useState(false);
  const [error, setError] = useState(null);
  const [message, setMessage] = useState(null);
  const [submitting, setSubmitting] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(null);
    if (password !== confirmPassword) { setError("Passwords do not match."); return; }
    setSubmitting(true);
    const { data, error: signUpErr } = await supabase.auth.signUp({
      email,
      password,
      options: { data: { full_name: fullName, role: invite.role, club: invite.club, invite_token: invite.token } }
    });
    if (signUpErr) {
      setError(signUpErr.message);
    } else if (data?.user) {
      await supabase.from("profiles").update({ role: invite.role, club: invite.club }).eq("id", data.user.id);
      // Mark invitation used
      await supabase.from("invitations").update({ used: true, used_by: data.user.id }).eq("token", invite.token);
      setMessage("Account created! Check your email for a confirmation link.");
    }
    setSubmitting(false);
  };

  return (
    <div style={{ fontFamily: "'Poppins', 'Segoe UI', -apple-system, sans-serif", background: "#eef2f7", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
      <div style={{ width: 420, background: "#fff", borderRadius: 16, boxShadow: "0 8px 32px rgba(0,0,0,0.12)", overflow: "hidden" }}>
        <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", padding: "32px 32px 24px", textAlign: "center", borderBottom: "3px solid #16a34a" }}>
          <div style={{ width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg, #7dd3fc, #38bdf8)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 600, color: "#0f172a", marginBottom: 12 }}>M</div>
          <div style={{ color: "#7dd3fc", fontSize: 22, fontWeight: 600 }}>You're Invited!</div>
          <div style={{ color: "#94a3b8", fontSize: 12, marginTop: 4 }}>Join {invite.club} on MatchGapper</div>
        </div>
        <form onSubmit={handleSubmit} style={{ padding: "28px 32px" }}>
          <div style={{ background: "#dcfce7", border: "1px solid #86efac", borderRadius: 10, padding: 14, marginBottom: 20, display: "flex", gap: 16 }}>
            <div>
              <div style={{ fontSize: 12, color: "#64748b" }}>Club</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#0f172a" }}>{invite.club}</div>
            </div>
            <div>
              <div style={{ fontSize: 12, color: "#64748b" }}>Role</div>
              <div style={{ fontSize: 14, fontWeight: 600, color: "#0f172a" }}>{ROLE_CONFIG[invite.role]?.label || invite.role}</div>
            </div>
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 4, display: "block" }}>Full Name</label>
            <input value={fullName} onChange={e => setFullName(e.target.value)} placeholder="John Smith" required
              style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #c1cad8", fontSize: 14, background: "#f5f7fb", outline: "none", boxSizing: "border-box" }} />
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 4, display: "block" }}>Email</label>
            <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" required
              style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: "1px solid #c1cad8", fontSize: 14, background: invite.email ? "#e2e8f0" : "#f5f7fb", outline: "none", boxSizing: "border-box" }}
              readOnly={!!invite.email} />
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 4, display: "block" }}>Password</label>
            <div style={{ position: "relative" }}>
              <input type={showPassword ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)} placeholder="Min 6 characters" required minLength={6}
                style={{ width: "100%", padding: "10px 14px", paddingRight: 60, borderRadius: 8, border: "1px solid #c1cad8", fontSize: 14, background: "#f5f7fb", outline: "none", boxSizing: "border-box" }} />
              <button type="button" onClick={() => setShowPassword(!showPassword)}
                style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", padding: "4px 8px", borderRadius: 4, border: "none", background: showPassword ? "#0f172a" : "#e2e8f0", color: showPassword ? "#7dd3fc" : "#64748b", fontSize: 10, fontWeight: 600, cursor: "pointer" }}>
                {showPassword ? "HIDE" : "SHOW"}
              </button>
            </div>
          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 4, display: "block" }}>Confirm Password</label>
            <input type={showPassword ? "text" : "password"} value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} placeholder="Re-enter password" required minLength={6}
              style={{ width: "100%", padding: "10px 14px", borderRadius: 8, border: `1px solid ${confirmPassword && confirmPassword !== password ? "#dc2626" : "#c1cad8"}`, fontSize: 14, background: "#f5f7fb", outline: "none", boxSizing: "border-box" }} />
            {confirmPassword && confirmPassword !== password && (
              <div style={{ fontSize: 11, color: "#dc2626", marginTop: 4, fontWeight: 600 }}>Passwords do not match</div>
            )}
          </div>
          {error && <div style={{ background: "#fee2e2", color: "#991b1b", padding: "10px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600, marginBottom: 14 }}>{error}</div>}
          {message && <div style={{ background: "#dcfce7", color: "#166534", padding: "10px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600, marginBottom: 14 }}>{message}</div>}
          <button type="submit" disabled={submitting || !!message}
            style={{ width: "100%", padding: "12px", borderRadius: 8, border: "none", background: "linear-gradient(135deg, #0f172a, #1e3a5f)", color: "#7dd3fc", fontWeight: 600, fontSize: 15, cursor: submitting ? "wait" : "pointer", opacity: submitting || message ? 0.7 : 1 }}>
            {submitting ? "Creating Account..." : "Create Account"}
          </button>
          <button type="button" onClick={onBack}
            style={{ width: "100%", padding: "10px", borderRadius: 8, border: "1px solid #c1cad8", background: "#fff", color: "#64748b", fontWeight: 600, fontSize: 13, cursor: "pointer", marginTop: 10 }}>
            Back to Sign In
          </button>
        </form>
      </div>
    </div>
  );
}

          </div>
          <div style={{ marginBottom: 20 }}>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#475569", marginBottom: 4, display: "block" }}>Password</label>

              <input type={showPassword ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)} placeholder="Min 6 characters" required minLength={6}

          {error && <div style={{ background: "#fee2e2", color: "#991b1b", padding: "10px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600, marginBottom: 14 }}>{error}</div>}
          <button type="submit" disabled={submitting}
            style={{ width: "100%", padding: "12px", borderRadius: 8, border: "none", background: "linear-gradient(135deg, #0f172a, #1e3a5f)", color: "#7dd3fc", fontWeight: 600, fontSize: 15, cursor: submitting ? "wait" : "pointer", opacity: submitting ? 0.7 : 1, transition: "opacity 0.2s" }}>
            {submitting ? "Signing In..." : "Sign In"}
          </button>
          <div style={{ borderTop: "1px solid #e2e8f0", marginTop: 24, paddingTop: 20, textAlign: "center" }}>

              Signup is by <strong>invitation only</strong>. Ask your club captain or admin for an invite link.

            <button type="button" onClick={onRegisterClub}
              style={{ padding: "10px 20px", borderRadius: 8, border: "1px solid #c1cad8", background: "#f8fafc", color: "#0f172a", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>

const fmtDateLong = (d) => { if (!d) return ""; const [y, m, day] = d.split("-"); const dt = new Date(+y, +m - 1, +day); return dt.toLocaleDateString("en-US", { weekday: "short", month: "long", day: "numeric", year: "numeric" }); };
const addMinutes = (timeStr, mins) => {
  if (!timeStr || !mins) return timeStr;
  const match = timeStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!match) return timeStr;
  let [, h, m, ampm] = match;
  let hours = parseInt(h); let minutes = parseInt(m);
  if (ampm.toUpperCase() === "PM" && hours !== 12) hours += 12;
  if (ampm.toUpperCase() === "AM" && hours === 12) hours = 0;
  const total = hours * 60 + minutes + mins;
  const nh = Math.floor(total / 60) % 24; const nm = total % 60;
  const newAmpm = nh >= 12 ? "PM" : "AM";
  const displayH = nh > 12 ? nh - 12 : nh === 0 ? 12 : nh;
  return `${displayH}:${nm.toString().padStart(2, "0")} ${newAmpm}`;
};

// ═══════════════════════════════════════════════════════════════
// HELPER FUNCTIONS
// ═══════════════════════════════════════════════════════════════
function computeTeamSplit(players, week, teamCount = 2) {
  const confirmed = players.filter(p => p.availability[week] === "yes").sort((a, b) => a.courseHdcp - b.courseHdcp);
  const maybe = players.filter(p => p.availability[week] === "maybe").sort((a, b) => a.courseHdcp - b.courseHdcp);
  const teams = [];
  const thresholds = [];
  const maybeTeams = [];
  const ranges = [];
  const rangeCalc = (arr) => arr.length > 0 ? { min: Math.min(...arr.map(p => p.courseHdcp)), max: Math.max(...arr.map(p => p.courseHdcp)) } : null;

  for (let i = 0; i < teamCount; i++) {
    const team = confirmed.slice(i * 12, (i + 1) * 12);
    teams.push(team);
    ranges.push(rangeCalc(team));
  }
  for (let i = 0; i < teamCount - 1; i++) {
    thresholds.push(teams[i].length > 0 ? Math.max(...teams[i].map(p => p.courseHdcp)) : null);
  }
  for (let i = 0; i < teamCount; i++) {
    const lo = i === 0 ? -Infinity : (thresholds[i-1] ?? -Infinity);
    if (i === 0) {
      maybeTeams.push(maybe.filter(p => thresholds.length === 0 || thresholds[0] === null || p.courseHdcp <= thresholds[0]));
    } else if (i === teamCount - 1) {
      maybeTeams.push(maybe.filter(p => p.courseHdcp > lo));
    } else {
      const hi = thresholds[i] ?? Infinity;
      maybeTeams.push(maybe.filter(p => p.courseHdcp > lo && p.courseHdcp <= hi));
    }
  }
  // Backward-compatible aliases for 2-team case
  return { teams, thresholds, maybeTeams, ranges, confirmed, maybe,
    t1: teams[0] || [], t2: teams[1] || [],
    maybe1: maybeTeams[0] || [], maybe2: maybeTeams[1] || [],
    threshold: thresholds[0] ?? null,
    t1Range: ranges[0] || null, t2Range: ranges[1] || null,
  };
}

function projectTeam(player, thresholds) {
  // Support old single-value threshold for backward compat
  if (thresholds === null || thresholds === undefined) return 0;
  if (typeof thresholds === "number") return player.courseHdcp <= thresholds ? 0 : 1;
  if (!Array.isArray(thresholds) || thresholds.length === 0) return 0;
  for (let i = 0; i < thresholds.length; i++) {
    if (thresholds[i] !== null && player.courseHdcp <= thresholds[i]) return i;
  }
  return thresholds.length;
}

function SeasonSetup({ schedule, setSchedule, lockState, userRole, clubName }) {
  const isAdmin = userRole === "admin" || userRole === "captain";

    if (!isAdmin) return;
    setSchedule(prev => ({ ...prev, [week]: { ...prev[week], [field]: value } }));
  };
  const updateTeam = (week, idx, field, value) => {
    if (!isAdmin) return;
    setSchedule(prev => {
      const newTeams = [...prev[week].teams];
      newTeams[idx] = { ...newTeams[idx], [field]: value };
      return { ...prev, [week]: { ...prev[week], teams: newTeams } };
    });
  };
  const updateTeamCount = (week, newCount) => {
    if (!isAdmin) return;
    setSchedule(prev => {
      const ws = prev[week];
      const oldTeams = ws.teams || [];

      for (let i = 0; i < newCount; i++) {
        teams.push(oldTeams[i] || { opponent: "", teamNum: "#1", homeTee: "", awayTee: "", interval: 10 });
