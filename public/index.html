// ADMIN PANEL (Admin-only)
// ═══════════════════════════════════════════════════════════════
function AdminPanel({ currentUserId, clubName }) {
  const [users, setUsers] = useState([]);
  const [loadingUsers, setLoadingUsers] = useState(true);
  const [saving, setSaving] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [inviteTab, setInviteTab] = useState("users"); // "users" or "invites"
  const [invites, setInvites] = useState([]);
  const [newInviteEmail, setNewInviteEmail] = useState("");
  const [newInviteRole, setNewInviteRole] = useState("vice_captain");
  const [sendingInvite, setSendingInvite] = useState(false);

  useEffect(() => {
    loadUsers();
    loadInvites();
  }, []);

  async function loadInvites() {
    const { data } = await supabase.from("invitations").select("*").eq("club", clubName).order("created_at", { ascending: false });
    if (data) setInvites(data);
  }

  async function sendInvite() {
    if (!newInviteEmail) return;
    setSendingInvite(true);
    setFeedback(null);
    const { data, error } = await supabase.from("invitations").insert({
      email: newInviteEmail.toLowerCase(),
      club: clubName,
      role: newInviteRole,
      invited_by: currentUserId,
    }).select("*").single();
    if (error) {
      setFeedback({ type: "error", msg: "Failed to create invite: " + error.message });
    } else {
      setInvites(prev => [data, ...prev]);
      const inviteUrl = `${window.location.origin}/?invite=${data.token}`;
      // Send invite email
      try {
        await fetch("https://matchgapper-club-notify.tom-54b.workers.dev/approve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            clubName: clubName,
            proName: "",
            proEmail: newInviteEmail.toLowerCase(),
            inviteToken: data.token,
          }),
        });
        setFeedback({ type: "success", msg: `Invite emailed to ${newInviteEmail}! Link: ${inviteUrl}` });
      } catch (e) {
        setFeedback({ type: "success", msg: `Invite created! Share this link: ${inviteUrl}` });
      }
      setNewInviteEmail("");
    }
    setSendingInvite(false);
  }

  async function loadUsers() {
    setLoadingUsers(true);
    const { data, error } = await supabase
      .from("profiles")
      .select("*")
      .eq("club", clubName)
      .order("created_at", { ascending: true });
    if (data) setUsers(data);
    if (error) setFeedback({ type: "error", msg: "Failed to load users: " + error.message });
    setLoadingUsers(false);
  }

  async function updateRole(userId, newRole) {
    setSaving(userId);
    setFeedback(null);
    const { error } = await supabase
      .from("profiles")
      .update({ role: newRole, updated_at: new Date().toISOString() })
      .eq("id", userId);
    if (error) {
      setFeedback({ type: "error", msg: "Failed to update: " + error.message });
    } else {
      setUsers(prev => prev.map(u => u.id === userId ? { ...u, role: newRole } : u));
      const user = users.find(u => u.id === userId);
      setFeedback({ type: "success", msg: `${user?.full_name || user?.email} updated to ${ROLE_CONFIG[newRole]?.label || newRole}` });
      setTimeout(() => setFeedback(null), 3000);
    }
    setSaving(null);
  }

  async function deleteUser(userId) {
    const user = users.find(u => u.id === userId);
    if (!window.confirm(`Remove ${user?.full_name || user?.email}? This will delete their profile. They would need to sign up again.`)) return;
    setSaving(userId);
    const { error } = await supabase.from("profiles").delete().eq("id", userId);
    if (error) {
      setFeedback({ type: "error", msg: "Failed to remove: " + error.message });
    } else {
      setUsers(prev => prev.filter(u => u.id !== userId));
      setFeedback({ type: "success", msg: `${user?.full_name || user?.email} removed` });
      setTimeout(() => setFeedback(null), 3000);
    }
    setSaving(null);
  }

  const roleOptions = [
    { value: "admin", label: "Admin", color: "#16a34a", bg: "#dcfce7" },
    { value: "captain", label: "Captain", color: "#1e40af", bg: "#dbeafe" },
    { value: "vice_captain", label: "Vice Captain", color: "#f59e0b", bg: "#fef3c7" },
  ];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 20, fontWeight: 600, color: "#0f172a" }}>Admin Panel</h2>
          <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Manage users, roles, and invitations</p>
        </div>
        <button onClick={() => { loadUsers(); loadInvites(); }} style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #c1cad8", background: "#fff", color: "#0f172a", fontWeight: 600, cursor: "pointer", fontSize: 12 }}>Refresh</button>
      </div>

      {/* Tab toggle */}
      <div style={{ display: "flex", gap: 0, marginBottom: 16, background: "#f1f5f9", borderRadius: 8, padding: 3, maxWidth: 300 }}>
        <button onClick={() => setInviteTab("users")} style={{ flex: 1, padding: "8px", borderRadius: 6, border: "none", background: inviteTab === "users" ? "#0f172a" : "transparent", color: inviteTab === "users" ? "#7dd3fc" : "#64748b", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>Users</button>
        <button onClick={() => setInviteTab("invites")} style={{ flex: 1, padding: "8px", borderRadius: 6, border: "none", background: inviteTab === "invites" ? "#0f172a" : "transparent", color: inviteTab === "invites" ? "#7dd3fc" : "#64748b", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>Invitations</button>
      </div>

      {feedback && (
        <div style={{ background: feedback.type === "error" ? "#fee2e2" : "#dcfce7", color: feedback.type === "error" ? "#991b1b" : "#166534", padding: "10px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, marginBottom: 14 }}>{feedback.msg}</div>
      )}

      {inviteTab === "users" && (
        loadingUsers ? (
          <div style={{ textAlign: "center", padding: 40, color: "#64748b", fontSize: 14 }}>Loading users...</div>
        ) : (
          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
            <div className="mg-table-wrap" style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ background: "linear-gradient(135deg, #0f172a 0%, #162d50 100%)", color: ACCENT }}>
                    {["Name", "Email", "Role", "Joined", "Actions"].map(h => (
                      <th key={h} style={{ padding: "12px 16px", textAlign: "left", fontWeight: 600, fontSize: 11, letterSpacing: 0.5 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {users.map((u, i) => {
                    const rc = ROLE_CONFIG[u.role] || ROLE_CONFIG.vice_captain;
                    const isCurrentUser = u.id === currentUserId;
                    const joinDate = u.created_at ? new Date(u.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "—";
                    return (
                      <tr key={u.id} style={{ background: i % 2 === 0 ? "#fff" : "#f5f7fb", borderBottom: "1px solid #e2e8f0" }}>
                        <td style={{ padding: "12px 16px", fontWeight: 600, color: "#0f172a" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            {u.full_name || "—"}
                            {isCurrentUser && <span style={{ fontSize: 9, fontWeight: 600, padding: "2px 6px", borderRadius: 4, background: "#e0f2fe", color: "#0369a1" }}>YOU</span>}
                          </div>
                        </td>
                        <td style={{ padding: "12px 16px", color: "#64748b", fontSize: 12 }}>{u.email}</td>
                        <td style={{ padding: "12px 16px" }}>
                          <div style={{ display: "flex", gap: 4 }}>
                            {roleOptions.map(r => (
                              <button key={r.value} onClick={() => updateRole(u.id, r.value)}
                                disabled={saving === u.id || (isCurrentUser && r.value !== "admin")}
                                style={{
                                  padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: saving === u.id ? "wait" : "pointer",
                                  border: u.role === r.value ? `2px solid ${r.color}` : "1px solid #e2e8f0",
                                  background: u.role === r.value ? r.bg : "#f8fafc",
                                  color: u.role === r.value ? r.color : "#94a3b8",
                                  opacity: (isCurrentUser && r.value !== "admin") ? 0.4 : 1,
                                  transition: "all 0.15s",
                                }}>
                                {r.label}
                              </button>
                            ))}
                          </div>
                        </td>
                        <td style={{ padding: "12px 16px", color: "#94a3b8", fontSize: 11 }}>{joinDate}</td>
                        <td style={{ padding: "12px 16px" }}>
                          {!isCurrentUser && (
                            <button onClick={() => deleteUser(u.id)}
                              disabled={saving === u.id}
                              style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #fca5a5", background: "#fff5f5", color: "#dc2626", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                              Remove
                            </button>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{ padding: "12px 16px", background: "#f5f7fb", borderTop: "1px solid #e2e8f0", fontSize: 11, color: "#64748b" }}>
              {users.length} user{users.length !== 1 ? "s" : ""} registered
            </div>
          </div>
        )
      )}

      {inviteTab === "invites" && (
        <div>
          {/* Send invite form */}
          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", padding: 20, marginBottom: 16 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: "#0f172a", marginBottom: 12 }}>Send Invitation</div>
            <div className="mg-pa-create" style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
              <div style={{ flex: "1 1 200px" }}>
                <label style={{ fontSize: 11, fontWeight: 600, color: "#64748b", display: "block", marginBottom: 4 }}>Email Address</label>
                <input type="email" value={newInviteEmail} onChange={e => setNewInviteEmail(e.target.value)} placeholder="captain@email.com"
                  style={{ width: "100%", padding: "8px 12px", borderRadius: 6, border: "1px solid #c1cad8", fontSize: 13, background: "#f5f7fb", outline: "none", boxSizing: "border-box" }} />
              </div>
              <div style={{ flex: "0 0 160px" }}>
                <label style={{ fontSize: 11, fontWeight: 600, color: "#64748b", display: "block", marginBottom: 4 }}>Role</label>
                <select value={newInviteRole} onChange={e => setNewInviteRole(e.target.value)}
                  style={{ width: "100%", padding: "8px 12px", borderRadius: 6, border: "1px solid #c1cad8", fontSize: 13, background: "#f5f7fb", cursor: "pointer" }}>
                  <option value="captain">Captain</option>
                  <option value="vice_captain">Vice Captain</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <button onClick={sendInvite} disabled={sendingInvite || !newInviteEmail}
                style={{ padding: "8px 20px", borderRadius: 6, border: "none", background: "linear-gradient(135deg, #0f172a, #1e3a5f)", color: "#7dd3fc", fontWeight: 600, fontSize: 13, cursor: sendingInvite ? "wait" : "pointer", opacity: sendingInvite || !newInviteEmail ? 0.6 : 1 }}>
                {sendingInvite ? "Sending..." : "Send Invite"}
              </button>
            </div>
            <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 8 }}>Invitations expire after 7 days. The recipient will use the link to create their account.</div>
          </div>

          {/* Invite list */}
          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
            <div className="mg-table-wrap" style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{ background: "linear-gradient(135deg, #0f172a 0%, #162d50 100%)", color: ACCENT }}>
                  {["Email", "Role", "Status", "Created", "Link"].map(h => (
                    <th key={h} style={{ padding: "12px 16px", textAlign: "left", fontWeight: 600, fontSize: 11, letterSpacing: 0.5 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {invites.length === 0 ? (
                  <tr><td colSpan={5} style={{ padding: 30, textAlign: "center", color: "#94a3b8", fontSize: 13 }}>No invitations sent yet</td></tr>
                ) : invites.map((inv, i) => {
                  const expired = new Date(inv.expires_at) < new Date();
                  const status = inv.used ? "Used" : expired ? "Expired" : "Pending";
                  const statusColor = inv.used ? "#16a34a" : expired ? "#dc2626" : "#f59e0b";
                  const statusBg = inv.used ? "#dcfce7" : expired ? "#fee2e2" : "#fef3c7";
                  const inviteUrl = `${window.location.origin}/?invite=${inv.token}`;
                  return (
                    <tr key={inv.id} style={{ background: i % 2 === 0 ? "#fff" : "#f5f7fb", borderBottom: "1px solid #e2e8f0" }}>
                      <td style={{ padding: "12px 16px", fontWeight: 600 }}>{inv.email}</td>
                      <td style={{ padding: "12px 16px" }}>
                        <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: (ROLE_CONFIG[inv.role] || ROLE_CONFIG.vice_captain).bg, color: (ROLE_CONFIG[inv.role] || ROLE_CONFIG.vice_captain).color }}>
                          {(ROLE_CONFIG[inv.role] || ROLE_CONFIG.vice_captain).label}
                        </span>
                      </td>
                      <td style={{ padding: "12px 16px" }}>
                        <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: statusBg, color: statusColor }}>{status}</span>
                      </td>
                      <td style={{ padding: "12px 16px", color: "#94a3b8", fontSize: 11 }}>
                        {new Date(inv.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" })}
                      </td>
                      <td style={{ padding: "12px 16px" }}>
                        {!inv.used && !expired && (
                          <button onClick={() => { navigator.clipboard.writeText(inviteUrl); setFeedback({ type: "success", msg: "Invite link copied!" }); setTimeout(() => setFeedback(null), 3000); }}
                            style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #c1cad8", background: "#f8fafc", color: "#0f172a", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                            Copy Link
                          </button>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            </div>
            <div style={{ padding: "12px 16px", background: "#f5f7fb", borderTop: "1px solid #e2e8f0", fontSize: 11, color: "#64748b" }}>
              {invites.length} invitation{invites.length !== 1 ? "s" : ""} total
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PLATFORM ADMIN GOD MODE — full cross-club management
// ═══════════════════════════════════════════════════════════════
const IconPlatform = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>);

function PlatformAdmin({ currentUserId, onEnterClub }) {
  const [clubs, setClubs] = useState([]);
  const [users, setUsers] = useState([]);
  const [invites, setInvites] = useState([]);
  const [loading, setLoading] = useState(true);
  const [feedback, setFeedback] = useState(null);
  const [processing, setProcessing] = useState(null);
  const [activeSection, setActiveSection] = useState("dashboard"); // dashboard, clubs, users, invites
  const [newInviteEmail, setNewInviteEmail] = useState("");
  const [newInviteClub, setNewInviteClub] = useState("");
  const [newInviteRole, setNewInviteRole] = useState("captain");
  const [pgaRequired, setPgaRequired] = useState(true);
  const [playerCounts, setPlayerCounts] = useState({});
  const [confirmModal, setConfirmModal] = useState(null);

  useEffect(() => { loadAll(); }, []);

  async function loadAll() {
    setLoading(true);
    const [clubsRes, usersRes, invitesRes, playersRes] = await Promise.all([
      supabase.from("clubs").select("*").order("created_at", { ascending: false }),
      supabase.from("profiles").select("*").order("created_at", { ascending: false }),
      supabase.from("invitations").select("*").order("created_at", { ascending: false }),
      supabase.from("players").select("club"),
    ]);
    if (clubsRes.data) setClubs(clubsRes.data);
    if (usersRes.data) setUsers(usersRes.data);
    if (invitesRes.data) setInvites(invitesRes.data);
    if (playersRes.data) {
      const counts = {};
      playersRes.data.forEach(p => { counts[p.club] = (counts[p.club] || 0) + 1; });
      setPlayerCounts(counts);
    }
    setLoading(false);
  }

  async function approveClub(club) {
    setProcessing(club.id);
    setFeedback(null);
    const { error: updateErr } = await supabase.from("clubs").update({ status: "approved", verified: true }).eq("id", club.id);
    if (updateErr) { setFeedback({ type: "error", msg: "Failed to approve: " + updateErr.message }); setProcessing(null); return; }
    const { data: inviteData, error: inviteErr } = await supabase.from("invitations").insert({
      email: club.pro_email, club: club.name, role: "admin", invited_by: currentUserId,
    }).select("token").single();
    if (inviteErr) {
      setFeedback({ type: "error", msg: "Club approved but invite creation failed: " + inviteErr.message });
    } else {
      const inviteUrl = `${window.location.origin}/?invite=${inviteData.token}`;
      // Send approval email to the pro
      try {
        await fetch("https://matchgapper-club-notify.tom-54b.workers.dev/approve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            clubName: club.name,
            proName: club.pro_name,
            proEmail: club.pro_email,
            inviteToken: inviteData.token,
          }),
        });
      } catch (e) { console.error("Failed to send approval email:", e); }
      setClubs(prev => prev.map(c => c.id === club.id ? { ...c, status: "approved", verified: true } : c));
      setFeedback({ type: "success", msg: `${club.name} approved! Invite emailed to ${club.pro_email}` });
      loadAll();
    }
    setProcessing(null);
  }

  async function rejectClub(clubId) {
    setProcessing(clubId);
    const { error } = await supabase.from("clubs").update({ status: "rejected" }).eq("id", clubId);
    if (!error) setClubs(prev => prev.map(c => c.id === clubId ? { ...c, status: "rejected" } : c));
    setProcessing(null);
  }

  function initiateDeleteClub(clubId) {
    const club = clubs.find(c => c.id === clubId);
    setConfirmModal({ type: "club", id: clubId, name: club?.name, playerCount: playerCounts[club?.name] || 0, typedName: "" });
  }

  async function confirmDeleteClub() {
    const { id: clubId, name: clubName } = confirmModal;
    setConfirmModal(null);
    setProcessing(clubId);
    await supabase.from("players").delete().eq("club", clubName);
    await supabase.from("invitations").delete().eq("club", clubName);
    const { error } = await supabase.from("clubs").delete().eq("id", clubId);
    if (!error) {
      setClubs(prev => prev.filter(c => c.id !== clubId));
      setPlayerCounts(prev => { const n = { ...prev }; delete n[clubName]; return n; });
      setFeedback({ type: "success", msg: `${clubName} deleted` });
      setTimeout(() => setFeedback(null), 3000);
    } else {
      setFeedback({ type: "error", msg: "Failed to delete club: " + error.message });
    }
    setProcessing(null);
  }

  function initiateDeleteUser(userId) {
    const user = users.find(u => u.id === userId);
    setConfirmModal({ type: "user", id: userId, name: user?.full_name || user?.email, typedName: "" });
  }

  async function confirmDeleteUser() {
    const { id: userId, name } = confirmModal;
    setConfirmModal(null);
    setProcessing(userId);
    const { error } = await supabase.from("profiles").delete().eq("id", userId);
    if (!error) {
      setUsers(prev => prev.filter(u => u.id !== userId));
      setFeedback({ type: "success", msg: `${name} removed` });
      setTimeout(() => setFeedback(null), 3000);
    } else {
      setFeedback({ type: "error", msg: "Failed to remove: " + error.message });
    }
    setProcessing(null);
  }

  async function updateUserRole(userId, newRole) {
    const { error } = await supabase.from("profiles").update({ role: newRole }).eq("id", userId);
    if (!error) setUsers(prev => prev.map(u => u.id === userId ? { ...u, role: newRole } : u));
  }

  async function togglePlatformAdmin(userId, current) {
    const { error } = await supabase.from("profiles").update({ platform_admin: !current }).eq("id", userId);
    if (!error) setUsers(prev => prev.map(u => u.id === userId ? { ...u, platform_admin: !current } : u));
  }

  async function deleteInvite(invId) {
    if (!confirm("Delete this invitation?")) return;
    const { error } = await supabase.from("invitations").delete().eq("id", invId);
    if (!error) {
      setInvites(prev => prev.filter(i => i.id !== invId));
      setFeedback({ type: "success", msg: "Invitation deleted." });
      setTimeout(() => setFeedback(null), 2000);
    } else {
      setFeedback({ type: "error", msg: "Failed to delete: " + error.message });
    }
  }

  async function createInvite() {
    if (!newInviteEmail || !newInviteClub) return;
    setProcessing("new-invite");
    const { data, error } = await supabase.from("invitations").insert({
      email: newInviteEmail, club: newInviteClub, role: newInviteRole, invited_by: currentUserId,
    }).select("token").single();
    if (data) {
      const url = `${window.location.origin}/?invite=${data.token}`;
      // Send invite email
      try {
        await fetch("https://matchgapper-club-notify.tom-54b.workers.dev/approve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            clubName: newInviteClub,
            proName: "",
            proEmail: newInviteEmail.toLowerCase(),
            inviteToken: data.token,
          }),
        });
        setFeedback({ type: "success", msg: `Invite emailed to ${newInviteEmail}! Link: ${url}` });
      } catch (e) {
        setFeedback({ type: "success", msg: `Invite created (email failed). Link: ${url}` });
      }
      setNewInviteEmail(""); setNewInviteClub(""); setNewInviteRole("captain");
      loadAll();
    }
    if (error) setFeedback({ type: "error", msg: error.message });
    setProcessing(null);
  }

  const pending = clubs.filter(c => c.status === "pending");
  const approved = clubs.filter(c => c.status === "approved");
  const rejected = clubs.filter(c => c.status === "rejected");
  const totalPlayers = approved.length; // placeholder — we'd need a count query

  const sectionBtns = [
    { id: "dashboard", label: "Overview", count: null },
    { id: "clubs", label: "Clubs", count: clubs.length },
    { id: "users", label: "Users", count: users.length },
    { id: "invites", label: "Invitations", count: invites.length },
  ];

  const inputStyle = { padding: "8px 12px", borderRadius: 8, border: "1px solid #c1cad8", fontSize: 13, background: "#f5f7fb", outline: "none" };

  return (
    <div>
      {/* Section Navigation */}
      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
        {sectionBtns.map(s => (
          <button key={s.id} onClick={() => setActiveSection(s.id)}
            style={{ padding: "8px 18px", borderRadius: 8, border: activeSection === s.id ? "2px solid #f59e0b" : "1px solid #c1cad8", background: activeSection === s.id ? "#fef3c7" : "#fff", color: activeSection === s.id ? "#92400e" : "#64748b", fontWeight: 600, fontSize: 12, cursor: "pointer" }}>
            {s.label} {s.count !== null && <span style={{ marginLeft: 4, opacity: 0.7 }}>({s.count})</span>}
          </button>
        ))}
        <button onClick={loadAll} style={{ marginLeft: "auto", padding: "8px 16px", borderRadius: 8, border: "1px solid #c1cad8", background: "#fff", fontWeight: 600, fontSize: 12, cursor: "pointer" }}>Refresh</button>
      </div>

      {feedback && (
        <div style={{ background: feedback.type === "error" ? "#fee2e2" : "#dcfce7", color: feedback.type === "error" ? "#991b1b" : "#166534", padding: "12px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, marginBottom: 14, wordBreak: "break-all", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span>{feedback.msg}</span>
          <button onClick={() => setFeedback(null)} style={{ background: "none", border: "none", fontSize: 16, cursor: "pointer", color: "inherit" }}>x</button>
        </div>
      )}

      {loading ? <div style={{ textAlign: "center", padding: 40, color: "#64748b" }}>Loading platform data...</div> : (
        <>
          {/* ── OVERVIEW ── */}
          {activeSection === "dashboard" && (
            <div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 16, marginBottom: 24 }}>
                {[
                  { label: "Active Clubs", value: approved.length, color: "#16a34a" },
                  { label: "Pending Clubs", value: pending.length, color: "#f59e0b" },
                  { label: "Total Users", value: users.length, color: "#1e40af" },
                  { label: "Platform Admins", value: users.filter(u => u.platform_admin).length, color: "#7c3aed" },
                  { label: "Active Invites", value: invites.filter(i => !i.used && new Date(i.expires_at) > new Date()).length, color: "#06b6d4" },
                  { label: "Rejected Clubs", value: rejected.length, color: "#dc2626" },
                ].map(({ label, value, color }) => (
                  <div key={label} style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", padding: 20, textAlign: "center" }}>
                    <div style={{ fontSize: 32, fontWeight: 600, color }}>{value}</div>
                    <div style={{ fontSize: 11, color: "#64748b", fontWeight: 600, marginTop: 4 }}>{label}</div>
                  </div>
                ))}
              </div>

              {/* Pending Registrations (always visible on overview) */}
              {pending.length > 0 && (

                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {pending.map(club => (

                        <div style={{ display: "flex", gap: 8 }}>

                            {processing === club.id ? "..." : "Approve & Create Invite"}
                          </button>
                          <button onClick={() => rejectClub(club.id)} disabled={processing === club.id}
                            style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #fca5a5", background: "#fff5f5", color: "#dc2626", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>Reject</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

              {/* Recent Users */}
              <div>
                <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 10 }}>Recent Signups</div>
                <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
                  <div className="mg-table-wrap" style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 600 }}>
                    <thead>
                      <tr style={{ background: "linear-gradient(135deg, #0f172a, #162d50)", color: "#f59e0b" }}>
                        {["Name", "Email", "Club", "Role", "Joined"].map(h => (
                          <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontWeight: 600, fontSize: 11, letterSpacing: 0.5 }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {users.slice(0, 10).map((u, i) => (
                        <tr key={u.id} style={{ background: i % 2 === 0 ? "#fff" : "#f5f7fb", borderBottom: "1px solid #e2e8f0" }}>
                          <td style={{ padding: "10px 14px", fontWeight: 600 }}>{u.full_name || "—"}</td>
                          <td style={{ padding: "10px 14px", color: "#64748b", fontSize: 12 }}>{u.email}</td>
                          <td style={{ padding: "10px 14px" }}>{u.club || "—"}</td>
                          <td style={{ padding: "10px 14px" }}>
                            <span style={{ padding: "2px 8px", borderRadius: 8, fontSize: 11, fontWeight: 600, background: u.platform_admin ? "#fef3c7" : (ROLE_CONFIG[u.role]?.bg || "#f1f5f9"), color: u.platform_admin ? "#92400e" : (ROLE_CONFIG[u.role]?.color || "#64748b") }}>
                              {u.platform_admin ? "Platform Admin" : (ROLE_CONFIG[u.role]?.label || u.role)}
                            </span>
                          </td>
                          <td style={{ padding: "10px 14px", color: "#94a3b8", fontSize: 11 }}>{u.created_at ? new Date(u.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" }) : "—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ── CLUBS ── */}
          {activeSection === "clubs" && (
            <div>
              <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 10 }}>All Clubs ({clubs.length})</div>
              <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
                <div className="mg-table-wrap" style={{ overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, minWidth: 600 }}>
                  <thead>
                    <tr style={{ background: "linear-gradient(135deg, #0f172a, #162d50)", color: "#f59e0b" }}>
                      {["Club", "PGA Pro", "Email", "Status", "Registered", "Actions"].map(h => (
                        <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontWeight: 600, fontSize: 11, letterSpacing: 0.5 }}>{h}</th>
                      ))}

                  </thead>
                  <tbody>
                    {clubs.map((club, i) => (

                        <td style={{ padding: "10px 14px" }}>{club.pro_name}</td>

                              <button onClick={() => rejectClub(club.id)} style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid #fca5a5", background: "#fff5f5", color: "#dc2626", fontWeight: 600, fontSize: 11, cursor: "pointer" }}>Reject</button>
                            </>

                          {club.status === "approved" && (
                            <button onClick={() => onEnterClub(club.name)}
                              style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid #7dd3fc", background: "#eff6ff", color: "#1e40af", fontWeight: 600, fontSize: 11, cursor: "pointer" }}>

                          <span style={{ fontSize: 11, color: "#64748b", padding: "4px 8px", background: "#f8fafc", borderRadius: 6, border: "1px solid #e2e8f0" }}>

                            Delete
                          </button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                </div>
              </div>

                            {u.club && u.club !== "MatchGapper" && (
                              <button onClick={() => onEnterClub(u.club)}
                                style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #7dd3fc", background: "#eff6ff", color: "#1e40af", fontWeight: 600, fontSize: 11, cursor: "pointer" }}>
                                View Club
                              </button>
                            )}
                            {u.id !== currentUserId && (
                              <button onClick={() => initiateDeleteUser(u.id)}
                                disabled={processing === u.id}
                                style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #fca5a5", background: "#fff5f5", color: "#dc2626", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                                Delete
                              </button>
                            )}
                          </div>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                </div>
              </div>
            </div>
          )}

          {/* ── INVITATIONS ── */}
          {activeSection === "invites" && (
            <div>
              {/* Create new invite */}
              <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", padding: 20, marginBottom: 20 }}>
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 12 }}>Create Invite for Any Club</div>
                <div className="mg-pa-create" style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
                  <div style={{ flex: "1 1 200px" }}>
                    <label style={{ fontSize: 11, fontWeight: 600, color: "#64748b", display: "block", marginBottom: 4 }}>Email</label>
                    <input type="email" value={newInviteEmail} onChange={e => setNewInviteEmail(e.target.value)} placeholder="user@email.com" style={{ ...inputStyle, width: "100%" }} />
                  </div>
                  <div style={{ flex: "1 1 200px" }}>
                    <label style={{ fontSize: 11, fontWeight: 600, color: "#64748b", display: "block", marginBottom: 4 }}>Club</label>
                    <input type="text" value={newInviteClub} onChange={e => setNewInviteClub(e.target.value)} placeholder="Club name" list="all-clubs-list" style={{ ...inputStyle, width: "100%" }} />
                    <datalist id="all-clubs-list">{GAP_CLUBS.map(c => <option key={c} value={c} />)}</datalist>
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 600, color: "#64748b", display: "block", marginBottom: 4 }}>Role</label>
                    <select value={newInviteRole} onChange={e => setNewInviteRole(e.target.value)} style={{ ...inputStyle, padding: "8px 12px" }}>
                      <option value="admin">Admin</option>
                      <option value="captain">Captain</option>
                      <option value="vice_captain">Vice Captain</option>
                    </select>
                  </div>
                  <button onClick={createInvite} disabled={processing === "new-invite"}
                    style={{ padding: "8px 20px", borderRadius: 8, border: "none", background: "#f59e0b", color: "#fff", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                    {processing === "new-invite" ? "..." : "Create Invite"}
                  </button>
                </div>
              </div>

              {/* Invite list */}
              <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 10 }}>All Invitations ({invites.length})</div>
              <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
                <div className="mg-table-wrap" style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                  <thead>
                    <tr style={{ background: "linear-gradient(135deg, #0f172a, #162d50)", color: "#f59e0b" }}>
                      {["Email", "Club", "Role", "Status", "Created", "Link"].map(h => (
                        <th key={h} style={{ padding: "10px 14px", textAlign: "left", fontWeight: 600, fontSize: 11, letterSpacing: 0.5 }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {invites.map((inv, i) => {
                      const expired = new Date(inv.expires_at) < new Date();
                      const status = inv.used ? "Used" : expired ? "Expired" : "Active";
                      const statusColor = inv.used ? "#16a34a" : expired ? "#94a3b8" : "#f59e0b";
                      const statusBg = inv.used ? "#dcfce7" : expired ? "#f1f5f9" : "#fef3c7";
                      return (
                        <tr key={inv.id} style={{ background: i % 2 === 0 ? "#fff" : "#f5f7fb", borderBottom: "1px solid #e2e8f0" }}>
                          <td style={{ padding: "10px 14px" }}>{inv.email}</td>
                          <td style={{ padding: "10px 14px" }}>{inv.club}</td>
                          <td style={{ padding: "10px 14px" }}>{ROLE_CONFIG[inv.role]?.label || inv.role}</td>
                          <td style={{ padding: "10px 14px" }}>
                            <span style={{ padding: "2px 10px", borderRadius: 8, fontSize: 11, fontWeight: 600, background: statusBg, color: statusColor }}>{status}</span>
                          </td>
                          <td style={{ padding: "10px 14px", color: "#94a3b8", fontSize: 11 }}>{new Date(inv.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</td>
                          <td style={{ padding: "10px 14px", display: "flex", gap: 4 }}>
                            {!inv.used && !expired && (
                              <button onClick={() => { navigator.clipboard.writeText(`${window.location.origin}/?invite=${inv.token}`); setFeedback({ type: "success", msg: "Invite link copied!" }); setTimeout(() => setFeedback(null), 2000); }}
                                style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #c1cad8", background: "#f8fafc", fontWeight: 600, fontSize: 11, cursor: "pointer" }}>
                                Copy Link
                              </button>
                            )}
                            <button onClick={() => deleteInvite(inv.id)}
                              style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #fca5a5", background: "#fff5f5", color: "#dc2626", fontWeight: 600, fontSize: 11, cursor: "pointer" }}>
                              Delete
                            </button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                </div>
              </div>
            </div>
          )}
        </>
      )}

      {confirmModal && ReactDOM.createPortal(
        <div onClick={() => setConfirmModal(null)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#fff", borderRadius: 14, padding: 28, width: 380, maxWidth: "92vw", boxShadow: "0 24px 64px rgba(0,0,0,0.35)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
              <div style={{ width: 40, height: 40, borderRadius: "50%", background: "#fef2f2", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>⚠️</div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, color: "#1e293b" }}>Permanently delete {confirmModal.type === "club" ? "club" : "user"}?</div>
                <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>This action cannot be undone.</div>
              </div>
            </div>
            {confirmModal.type === "club" && (
              <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13 }}>
                <div style={{ fontWeight: 600, color: "#991b1b", marginBottom: 4 }}>{confirmModal.name}</div>
                <div style={{ color: "#dc2626" }}>This will permanently delete <strong>{confirmModal.playerCount} players</strong>, all invitations, and the club record.</div>
              </div>
            )}
            {confirmModal.type === "user" && (
              <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#991b1b" }}>
                <strong>{confirmModal.name}</strong>'s profile will be permanently removed.
              </div>
            )}
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, color: "#475569", marginBottom: 6 }}>Type <strong>{confirmModal.name}</strong> to confirm:</div>
              <input autoFocus value={confirmModal.typedName}
                onChange={e => setConfirmModal(prev => ({ ...prev, typedName: e.target.value }))}
                placeholder={confirmModal.name}
                style={{ width: "100%", padding: "8px 12px", borderRadius: 7, border: "1px solid #cbd5e1", fontSize: 13, boxSizing: "border-box", outline: "none" }} />
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setConfirmModal(null)} style={{ padding: "8px 18px", borderRadius: 7, border: "1px solid #d1d5db", background: "#fff", color: "#374151", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>Cancel</button>
              <button disabled={confirmModal.typedName !== confirmModal.name}
                onClick={confirmModal.type === "club" ? confirmDeleteClub : confirmDeleteUser}
                style={{ padding: "8px 18px", borderRadius: 7, border: "none", background: confirmModal.typedName === confirmModal.name ? "#dc2626" : "#fca5a5", color: "#fff", fontWeight: 700, fontSize: 13, cursor: confirmModal.typedName === confirmModal.name ? "pointer" : "not-allowed", transition: "background 0.15s" }}>
                Delete permanently
              </button>
            </div>
          </div>
        </div>,
        document.body
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ROOT COMPONENT (with Supabase Auth)
// ═══════════════════════════════════════════════════════════════
const TAB_PATHS = {
  dashboard: "/dashboard", builder: "/team-builder", roster: "/roster",
  setup: "/season-setup", admin: "/admin", platform: "/platform",
};
const PATH_TO_TAB = Object.fromEntries(Object.entries(TAB_PATHS).map(([k, v]) => [v, k]));

function getTabFromPath() {
  const path = window.location.pathname;
  return PATH_TO_TAB[path] || "dashboard";
}

function GAPManager() {
  const { session, profile, loading, signIn, signUp, signOut, fetchProfile } = useAuth();
  const [activeTab, setActiveTabRaw] = useState(getTabFromPath);

  const setActiveTab = useCallback((tab) => {
    setActiveTabRaw(tab);
    const path = TAB_PATHS[tab] || "/dashboard";
    // Preserve query string (e.g. ?invite=TOKEN) when pushing state
    const search = window.location.search;
    if (window.location.pathname !== path) {
      window.history.pushState({ tab }, "", path + search);
    }
  }, []);

  // Handle browser back/forward
  useEffect(() => {
    const onPopState = (e) => {
      const tab = e.state?.tab || getTabFromPath();
      setActiveTabRaw(tab);
    };
    window.addEventListener("popstate", onPopState);
    return () => window.removeEventListener("popstate", onPopState);
  }, []);
  const [players, setPlayers] = useState([]);
  const [playersLoaded, setPlayersLoaded] = useState(false);
  const [schedule, setSchedule] = useState(DEFAULT_SCHEDULE);
  const [lockState, setLockState] = useState(DEFAULT_LOCK_STATE);
  const emptyWeek = (teamCount) => { const w = {}; for (let i = 0; i < teamCount; i++) { w[i] = { home: [[], [], []], away: [[], [], []] }; } return w; };
  const [assignments, setAssignments] = useState(() => {
    const init = {}; [1, 2, 3].forEach(w => { init[w] = emptyWeek(DEFAULT_SCHEDULE[w]?.teamCount || 2); }); return init;
  });
  const [appScreen, setAppScreen] = useState("main"); // "main", "register_club", "platform_admin_signup"
  const [viewingClub, setViewingClub] = useState(() => sessionStorage.getItem("viewingClub") || null); // god mode: override club context
  const [inviteData, setInviteData] = useState(null); // holds validated invite info
  const [inviteLoading, setInviteLoading] = useState(false);

  // Check for invite token in URL on mount — use INITIAL_INVITE_TOKEN captured before routing
  useEffect(() => {
    const inviteToken = INITIAL_INVITE_TOKEN;
    if (inviteToken) {
      setInviteLoading(true);
      supabase.from("invitations").select("*").eq("token", inviteToken).single().then(({ data }) => {
        if (data && !data.used && new Date(data.expires_at) > new Date()) {
          setInviteData({ ...data, token: inviteToken });
        }
        setInviteLoading(false);
      });
    }
  }, []);

  // Derive role from profile — default to vice_captain for safety
  const isPlatformAdmin = !!profile?.platform_admin || PLATFORM_ADMIN_EMAILS.includes(profile?.email?.toLowerCase());
  const userRole = isPlatformAdmin ? "admin" : (profile?.role || "vice_captain");
  const isAdmin = userRole === "admin";
  const isCaptain = userRole === "captain" || isAdmin;
  const rc = ROLE_CONFIG[userRole] || ROLE_CONFIG.vice_captain;
  const clubName = profile?.club || "My Club";
  const clubInitial = clubName.charAt(0).toUpperCase();

  // Load players from Supabase when profile is ready
  // If in god mode (viewingClub set), load that club's players instead of profile.club
  useEffect(() => {
    const clubToLoad = viewingClub || (profile?.onboarded ? profile?.club : null);
    if (!clubToLoad) return;
    loadPlayersFromDb(clubToLoad).then(dbPlayers => {
      setPlayers(dbPlayers);
      setPlayersLoaded(true);
    });
  }, [profile?.club, profile?.onboarded, viewingClub]);

  // Load schedule & assignments from Supabase
  const scheduleLoadedRef = useRef(false);
  const assignmentsLoadedRef = useRef(false);

  useEffect(() => {
    const club = viewingClub || profile?.club;
    if (!club || (!profile?.onboarded && !isPlatformAdmin)) return;
    scheduleLoadedRef.current = false;
    assignmentsLoadedRef.current = false;
    loadScheduleFromDb(club).then(({ schedule: dbSched, lockState: dbLocks }) => {
      if (dbSched) {
        // Merge with defaults for any missing weeks
        const merged = { ...DEFAULT_SCHEDULE };
        [1, 2, 3].forEach(w => { if (dbSched[w]) merged[w] = dbSched[w]; });
        setSchedule(merged);
      } else {
        setSchedule(JSON.parse(JSON.stringify(DEFAULT_SCHEDULE)));
      }
      if (dbLocks) {
        const mergedLocks = { ...DEFAULT_LOCK_STATE };
        [1, 2, 3].forEach(w => { if (dbLocks[w]) mergedLocks[w] = dbLocks[w]; });
        setLockState(mergedLocks);
      }
      // Small delay to let state settle before enabling auto-save
      setTimeout(() => { scheduleLoadedRef.current = true; }, 500);
    });
    loadAssignmentsFromDb(club).then(dbAsgn => {
      if (dbAsgn) {
        const merged = {};
        [1, 2, 3].forEach(w => {
          merged[w] = dbAsgn[w] || emptyWeek(schedule[w]?.teamCount || 2);
        });
        setAssignments(merged);
      }
      setTimeout(() => { assignmentsLoadedRef.current = true; }, 500);
    });
  }, [profile?.club, profile?.onboarded, viewingClub]);

  // Auto-save schedule (debounced)
  // Guard: only save after load is confirmed AND only if the schedule has actual content
  // (prevents blank DEFAULT_SCHEDULE from overwriting real data on hard-refresh race conditions)
  const saveScheduleTimer = useRef(null);
  useEffect(() => {
    if (!scheduleLoadedRef.current) return;
    const club = viewingClub || profile?.club;
    if (!club || (isPlatformAdmin && !viewingClub)) return;
    // Don't save if all weeks are completely empty (opponents all blank) — likely a race condition
    const hasAnyContent = [1, 2, 3].some(w =>
      schedule[w]?.date || schedule[w]?.teams?.some(t => t.opponent)
    );
    if (!hasAnyContent) return;
    clearTimeout(saveScheduleTimer.current);
    saveScheduleTimer.current = setTimeout(() => {
      [1, 2, 3].forEach(w => {
        saveScheduleWeekToDb(club, w, schedule[w], lockState[w], session?.user?.id);
      });
    }, 1200);
    return () => clearTimeout(saveScheduleTimer.current);
  }, [schedule, lockState]);

  // Auto-save assignments (debounced)
  const saveAssignmentsTimer = useRef(null);
  useEffect(() => {
    if (!assignmentsLoadedRef.current) return;
    const club = viewingClub || profile?.club;
    if (!club || isPlatformAdmin && !viewingClub) return;
    clearTimeout(saveAssignmentsTimer.current);
    saveAssignmentsTimer.current = setTimeout(() => {
      [1, 2, 3].forEach(w => {
        saveAssignmentsWeekToDb(club, w, assignments[w], session?.user?.id);
      });
    }, 1200);
    return () => clearTimeout(saveAssignmentsTimer.current);
  }, [assignments]);

  // Wrapper to save player changes to Supabase
  const setPlayersWithSync = useCallback((updater) => {
    setPlayers(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      const saveClub = viewingClub || clubName;
      // Find changed players and sync to DB
      next.forEach(p => {
        const old = prev.find(op => op.id === p.id);
        if (!old || JSON.stringify(old) !== JSON.stringify(p)) {
          savePlayerToDb(p, saveClub, session?.user?.id);
        }
      });
      // Find deleted players
      prev.forEach(p => {
        if (!next.find(np => np.id === p.id)) {
          deletePlayerFromDb(p.id);
        }
      });
      return next;
    });
  }, [clubName, viewingClub, session?.user?.id]);

  // Handle new player add (needs to get DB id back)
  const addPlayerWithSync = useCallback(async (newPlayer) => {
    const row = appPlayerToDb(newPlayer, effectiveClubName, session?.user?.id);
    delete row.id;
    const { data, error } = await supabase.from("players").insert(row).select("*").single();
    if (data) {
      setPlayers(prev => [...prev, dbPlayerToApp(data)]);
      return data.id;
    }
    return null;
  }, [effectiveClubName, session?.user?.id]);

  // Must be declared before any conditional returns (React Rules of Hooks)
  const [clubHasPlayers, setClubHasPlayers] = useState(null);
  const [godModeExiting, setGodModeExiting] = useState(false);
  useEffect(() => {
    if (profile && !profile.onboarded && profile.club && !PLATFORM_ADMIN_EMAILS.includes(profile?.email?.toLowerCase())) {
      supabase.from("players").select("id", { count: "exact", head: true }).eq("club", profile.club)
        .then(({ count }) => {
          if (count > 0) {
            supabase.from("profiles").update({ onboarded: true }).eq("id", profile.id).then(() => {
              fetchProfile(session.user.id);
            });
            setClubHasPlayers(true);
          } else {
            setClubHasPlayers(false);
          }
        });
    }
  }, [profile?.id, profile?.onboarded]);

  if (loading) {
    return (
      <div style={{ fontFamily: "'Poppins', sans-serif", background: "#eef2f7", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ textAlign: "center", color: "#64748b" }}>
          <div style={{ width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg, #7dd3fc, #38bdf8)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 600, color: "#0f172a", marginBottom: 16 }}>M</div>
          <div style={{ fontSize: 16, fontWeight: 600 }}>Loading...</div>
        </div>
      </div>
    );
  }

  if (!session) {
    if (inviteLoading) {
      return (
        <div style={{ fontFamily: "'Poppins', sans-serif", background: "#eef2f7", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ textAlign: "center", color: "#64748b" }}>
            <div style={{ width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg, #7dd3fc, #38bdf8)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 600, color: "#0f172a", marginBottom: 16 }}>M</div>
            <div style={{ fontSize: 16, fontWeight: 600 }}>Validating invitation...</div>
          </div>
        </div>
      );
    }
    if (inviteData) {
      return <InviteSignup invite={inviteData} onSignUp={signUp} onBack={() => { setInviteData(null); window.history.replaceState({}, "", window.location.pathname); }} />;
    }
    if (appScreen === "register_club") {
      return <ClubRegistration onBack={() => setAppScreen("main")} />;
    }
    if (appScreen === "platform_admin_signup") {
      return <PlatformAdminSignup onSignUp={signUp} onBack={() => setAppScreen("main")} />;
    }
    return <LoginScreen onSignIn={signIn} onSignUp={signUp} onRegisterClub={() => setAppScreen("register_club")} onPlatformAdmin={() => setAppScreen("platform_admin_signup")} />;
  }

  // Platform admins skip onboarding — check both flag and email as fallback
  const isPlatformByEmail = PLATFORM_ADMIN_EMAILS.includes(profile?.email?.toLowerCase());

  if (profile && !profile.onboarded && !isPlatformAdmin && !isPlatformByEmail) {
    // Still checking, or club has players (auto-onboarding in progress)
    if (clubHasPlayers === null || clubHasPlayers === true) {
      return <div style={{ display: "flex", justifyContent: "center", alignItems: "center", height: "100vh", fontFamily: "Poppins, sans-serif", color: "#64748b" }}>Loading...</div>;
    }
    return <OnboardingWizard profile={profile} session={session} onComplete={() => {
      fetchProfile(session.user.id);
    }} onSetTeamCount={(count) => {
      setSchedule(prev => {
        const next = { ...prev };
        [1, 2, 3].forEach(w => {
          const ws = next[w];
          const oldTeams = ws.teams || [];
          const teams = [];
          for (let i = 0; i < count; i++) { teams.push(oldTeams[i] || EMPTY_TEAM()); }
          next[w] = { ...ws, teamCount: count, teams };
        });
        return next;
      });
    }} />;
  }

  // Platform admins who aren't viewing a specific club see only the Platform tab
  // When viewing a club, they see all tabs + a "Back to Platform" button
  const isViewingClub = isPlatformAdmin && viewingClub;
  const effectiveClubName = viewingClub || clubName;
  const effectiveClubInitial = effectiveClubName.charAt(0).toUpperCase();

  const tabs = isPlatformAdmin && !viewingClub
    ? [{ id: "platform", label: "Platform Admin", Icon: IconPlatform }]
    : [
        { id: "dashboard", label: "Dashboard", Icon: IconDashboard },
        { id: "builder", label: "Team Builder", Icon: IconBuilder },
        { id: "roster", label: "Roster", Icon: IconRoster },
        { id: "setup", label: "Season Setup", Icon: IconSetup },
        ...(isCaptain || isPlatformAdmin ? [{ id: "admin", label: "Admin", Icon: IconAdmin }] : []),
        ...(isPlatformAdmin ? [{ id: "platform", label: "Platform", Icon: IconPlatform }] : []),
      ];

  // Force platform tab for platform admins not viewing a club
  const effectiveTab = (isPlatformAdmin && !viewingClub && !["platform"].includes(activeTab)) ? "platform" : activeTab;

  const handleEnterClub = (club) => {
    sessionStorage.setItem("viewingClub", club);
    setViewingClub(club);
    setActiveTab("dashboard");
    // Load that club's players
    loadPlayersFromDb(club).then(dbPlayers => {
      setPlayers(dbPlayers);
      setPlayersLoaded(true);
    });
  };

  const handleExitClub = () => {
    setGodModeExiting(true);
    // Small delay to let any in-flight saves complete before clearing state
    setTimeout(() => {
      sessionStorage.removeItem("viewingClub");
      setViewingClub(null);
      setActiveTab("platform");
      setPlayers([]);
      setPlayersLoaded(false);
      setGodModeExiting(false);
    }, 800);
  };

  const headerAccent = isPlatformAdmin && !viewingClub ? "#f59e0b" : "#7dd3fc";
  const headerBorder = isPlatformAdmin && !viewingClub ? "3px solid #f59e0b" : "3px solid #7dd3fc";

  return (
    <div style={{ fontFamily: "'Poppins', 'Segoe UI', -apple-system, sans-serif", background: "#eef2f7", minHeight: "100vh", color: "#0f172a" }}>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />

      {/* God mode banner when viewing a club */}
      {(isViewingClub || godModeExiting) && (
        <div style={{ background: "#f59e0b", color: "#0f172a", padding: "6px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", fontSize: 12, fontWeight: 600 }}>
          <span>{godModeExiting ? "Saving changes..." : `GOD MODE — Viewing ${viewingClub} as Platform Admin`}</span>
          <button onClick={handleExitClub} disabled={godModeExiting}
            style={{ padding: "4px 16px", borderRadius: 6, border: "none", background: "#0f172a", color: "#f59e0b", fontWeight: 600, fontSize: 11, cursor: godModeExiting ? "default" : "pointer", opacity: godModeExiting ? 0.5 : 1 }}>
            {godModeExiting ? "Please wait..." : "Back to Platform"}
          </button>
        </div>
      )}

      <header className="mg-header" style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", padding: "0 24px", borderBottom: headerBorder }}>
        <div className="mg-header-inner" style={{ maxWidth: 1400, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div className="mg-branding" style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <div className="mg-logo" style={{ width: 42, height: 42, borderRadius: "50%", background: isPlatformAdmin && !viewingClub ? "linear-gradient(135deg, #f59e0b, #d97706)" : "linear-gradient(135deg, #7dd3fc, #38bdf8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, fontWeight: 600, color: isPlatformAdmin && !viewingClub ? "#fff" : "#0f172a" }}>
              {isPlatformAdmin && !viewingClub ? "⚡" : effectiveClubInitial}
            </div>
            <div className="mg-branding-text">
              <div style={{ color: headerAccent, fontSize: 20, fontWeight: 600, lineHeight: 1.1 }}>
                {isPlatformAdmin && !viewingClub ? "MatchGapper" : effectiveClubName}
              </div>
              <div style={{ color: "#94a3b8", fontSize: 11, letterSpacing: 1 }}>
                {isPlatformAdmin && !viewingClub ? "PLATFORM ADMINISTRATION" : "BMW GAP TEAM MATCHES 2026"}
              </div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <nav className="mg-nav" style={{ display: "flex", gap: 2 }}>
              {tabs.map(t => (
                <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ padding: "16px 20px", background: effectiveTab === t.id ? (headerAccent + "15") : "transparent", border: "none", borderBottom: effectiveTab === t.id ? `3px solid ${headerAccent}` : "3px solid transparent", color: effectiveTab === t.id ? headerAccent : "#94a3b8", cursor: "pointer", fontSize: 13, fontWeight: 600, transition: "all 0.2s", display: "flex", alignItems: "center", gap: 6 }}>
                  <t.Icon /> {t.label}
                </button>
              ))}
            </nav>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div className="mg-user-info" style={{ textAlign: "right" }}>
                <div style={{ color: "#cbd5e1", fontSize: 12, fontWeight: 600 }}>{profile?.full_name || session.user.email}</div>
                <span style={{ fontSize: 9, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: isPlatformAdmin ? "#fef3c7" : rc.bg, color: isPlatformAdmin ? "#92400e" : rc.color, letterSpacing: 0.5 }}>
                  {isPlatformAdmin ? "PLATFORM ADMIN" : rc.label.toUpperCase()}
                </span>
              </div>
              <button className="mg-signout" onClick={signOut} style={{ padding: "6px 12px", borderRadius: 6, border: "1px solid #334155", background: "transparent", color: "#94a3b8", fontSize: 11, fontWeight: 600, cursor: "pointer" }} title="Sign out">
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </header>
      <main className="mg-main" style={{ maxWidth: 1400, margin: "0 auto", padding: "24px" }}>
        {effectiveTab === "dashboard" && <Dashboard players={players} schedule={schedule} lockState={lockState} clubName={effectiveClubName} assignments={assignments} />}
        {effectiveTab === "roster" && <Roster players={players} setPlayers={setPlayersWithSync} addPlayerWithSync={addPlayerWithSync} clubName={effectiveClubName} userId={session.user.id} schedule={schedule} />}
        {effectiveTab === "builder" && <TeamBuilder players={players} schedule={schedule} lockState={lockState} setLockState={setLockState} userRole={userRole} clubName={effectiveClubName} assignments={assignments} setAssignments={setAssignments} />}
        {effectiveTab === "setup" && <SeasonSetup schedule={schedule} setSchedule={setSchedule} lockState={lockState} userRole={userRole} clubName={effectiveClubName} />}
        {effectiveTab === "admin" && (isCaptain || isPlatformAdmin) && <AdminPanel currentUserId={session.user.id} clubName={effectiveClubName} />}
        {effectiveTab === "platform" && isPlatformAdmin && <PlatformAdmin currentUserId={session.user.id} onEnterClub={handleEnterClub} />}
      </main>
      <footer style={{ textAlign: "center", padding: "16px", color: "#64748b", fontSize: 11, borderTop: "1px solid #d1d9e6" }}>MatchGapper · BMW GAP Team Match Manager · All matches scratch — no handicap strokes</footer>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(GAPManager));
  </script>
</body>
</html>
