// ADMIN PANEL (Admin-only)
// ═══════════════════════════════════════════════════════════════
function AdminPanel({ currentUserId, clubName }) {
  const [users, setUsers] = useState([]);
  const [loadingUsers, setLoadingUsers] = useState(true);
  const [saving, setSaving] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [inviteTab, setInviteTab] = useState("users"); // "users" or "invites"
  const [invites, setInvites] = useState([]);
  const [newInviteEmail, setNewInviteEmail] = useState("");
  const [newInviteRole, setNewInviteRole] = useState("vice_captain");
  const [sendingInvite, setSendingInvite] = useState(false);

  useEffect(() => {
    loadUsers();
    loadInvites();
  }, []);

  async function loadInvites() {
    const { data } = await supabase.from("invitations").select("*").eq("club", clubName).order("created_at", { ascending: false });
    if (data) setInvites(data);
  }

  async function sendInvite() {
    if (!newInviteEmail) return;
    setSendingInvite(true);
    setFeedback(null);
    const { data, error } = await supabase.from("invitations").insert({
      email: newInviteEmail.toLowerCase(),
      club: clubName,
      role: newInviteRole,
      invited_by: currentUserId,
    }).select("*").single();
    if (error) {
      setFeedback({ type: "error", msg: "Failed to create invite: " + error.message });
    } else {
      setInvites(prev => [data, ...prev]);
      const inviteUrl = `${window.location.origin}${window.location.pathname}?invite=${data.token}`;
      setFeedback({ type: "success", msg: `Invite created! Share this link: ${inviteUrl}` });
      setNewInviteEmail("");
    }
    setSendingInvite(false);
  }

  async function loadUsers() {
    setLoadingUsers(true);
    const { data, error } = await supabase
      .from("profiles")
      .select("*")
      .order("created_at", { ascending: true });
    if (data) setUsers(data);
    if (error) setFeedback({ type: "error", msg: "Failed to load users: " + error.message });
    setLoadingUsers(false);
  }

  async function updateRole(userId, newRole) {
    setSaving(userId);
    setFeedback(null);
    const { error } = await supabase
      .from("profiles")
      .update({ role: newRole, updated_at: new Date().toISOString() })
      .eq("id", userId);
    if (error) {
      setFeedback({ type: "error", msg: "Failed to update: " + error.message });
    } else {
      setUsers(prev => prev.map(u => u.id === userId ? { ...u, role: newRole } : u));
      const user = users.find(u => u.id === userId);
      setFeedback({ type: "success", msg: `${user?.full_name || user?.email} updated to ${ROLE_CONFIG[newRole]?.label || newRole}` });
      setTimeout(() => setFeedback(null), 3000);
    }
    setSaving(null);
  }

  async function deleteUser(userId) {
    const user = users.find(u => u.id === userId);
    if (!window.confirm(`Remove ${user?.full_name || user?.email}? This will delete their profile. They would need to sign up again.`)) return;
    setSaving(userId);
    const { error } = await supabase.from("profiles").delete().eq("id", userId);
    if (error) {
      setFeedback({ type: "error", msg: "Failed to remove: " + error.message });
    } else {
      setUsers(prev => prev.filter(u => u.id !== userId));
      setFeedback({ type: "success", msg: `${user?.full_name || user?.email} removed` });
      setTimeout(() => setFeedback(null), 3000);
    }
    setSaving(null);
  }

  const roleOptions = [
    { value: "admin", label: "Admin", color: "#16a34a", bg: "#dcfce7" },
    { value: "captain", label: "Captain", color: "#1e40af", bg: "#dbeafe" },
    { value: "vice_captain", label: "Vice Captain", color: "#f59e0b", bg: "#fef3c7" },
  ];

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 20, fontWeight: 600, color: "#0f172a" }}>Admin Panel</h2>
          <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Manage users, roles, and invitations</p>
        </div>
        <button onClick={() => { loadUsers(); loadInvites(); }} style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #c1cad8", background: "#fff", color: "#0f172a", fontWeight: 600, cursor: "pointer", fontSize: 12 }}>Refresh</button>
      </div>

      {/* Tab toggle */}
      <div style={{ display: "flex", gap: 0, marginBottom: 16, background: "#f1f5f9", borderRadius: 8, padding: 3, maxWidth: 300 }}>
        <button onClick={() => setInviteTab("users")} style={{ flex: 1, padding: "8px", borderRadius: 6, border: "none", background: inviteTab === "users" ? "#0f172a" : "transparent", color: inviteTab === "users" ? "#7dd3fc" : "#64748b", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>Users</button>
        <button onClick={() => setInviteTab("invites")} style={{ flex: 1, padding: "8px", borderRadius: 6, border: "none", background: inviteTab === "invites" ? "#0f172a" : "transparent", color: inviteTab === "invites" ? "#7dd3fc" : "#64748b", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>Invitations</button>
      </div>

      {feedback && (
        <div style={{ background: feedback.type === "error" ? "#fee2e2" : "#dcfce7", color: feedback.type === "error" ? "#991b1b" : "#166534", padding: "10px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, marginBottom: 14 }}>{feedback.msg}</div>
      )}

      {inviteTab === "users" && (
        loadingUsers ? (
          <div style={{ textAlign: "center", padding: 40, color: "#64748b", fontSize: 14 }}>Loading users...</div>
        ) : (
          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ background: "linear-gradient(135deg, #0f172a 0%, #162d50 100%)", color: ACCENT }}>
                    {["Name", "Email", "Role", "Joined", "Actions"].map(h => (
                      <th key={h} style={{ padding: "12px 16px", textAlign: "left", fontWeight: 600, fontSize: 11, letterSpacing: 0.5 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {users.map((u, i) => {
                    const rc = ROLE_CONFIG[u.role] || ROLE_CONFIG.vice_captain;
                    const isCurrentUser = u.id === currentUserId;
                    const joinDate = u.created_at ? new Date(u.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "—";
                    return (
                      <tr key={u.id} style={{ background: i % 2 === 0 ? "#fff" : "#f5f7fb", borderBottom: "1px solid #e2e8f0" }}>
                        <td style={{ padding: "12px 16px", fontWeight: 600, color: "#0f172a" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                            {u.full_name || "—"}
                            {isCurrentUser && <span style={{ fontSize: 9, fontWeight: 600, padding: "2px 6px", borderRadius: 4, background: "#e0f2fe", color: "#0369a1" }}>YOU</span>}
                          </div>
                        </td>
                        <td style={{ padding: "12px 16px", color: "#64748b", fontSize: 12 }}>{u.email}</td>
                        <td style={{ padding: "12px 16px" }}>
                          <div style={{ display: "flex", gap: 4 }}>
                            {roleOptions.map(r => (
                              <button key={r.value} onClick={() => updateRole(u.id, r.value)}
                                disabled={saving === u.id || (isCurrentUser && r.value !== "admin")}
                                style={{
                                  padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 600, cursor: saving === u.id ? "wait" : "pointer",
                                  border: u.role === r.value ? `2px solid ${r.color}` : "1px solid #e2e8f0",
                                  background: u.role === r.value ? r.bg : "#f8fafc",
                                  color: u.role === r.value ? r.color : "#94a3b8",
                                  opacity: (isCurrentUser && r.value !== "admin") ? 0.4 : 1,
                                  transition: "all 0.15s",
                                }}>
                                {r.label}
                              </button>
                            ))}
                          </div>
                        </td>
                        <td style={{ padding: "12px 16px", color: "#94a3b8", fontSize: 11 }}>{joinDate}</td>
                        <td style={{ padding: "12px 16px" }}>
                          {!isCurrentUser && (
                            <button onClick={() => deleteUser(u.id)}
                              disabled={saving === u.id}
                              style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #fca5a5", background: "#fff5f5", color: "#dc2626", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                              Remove
                            </button>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{ padding: "12px 16px", background: "#f5f7fb", borderTop: "1px solid #e2e8f0", fontSize: 11, color: "#64748b" }}>
              {users.length} user{users.length !== 1 ? "s" : ""} registered
            </div>
          </div>
        )
      )}

      {inviteTab === "invites" && (
        <div>
          {/* Send invite form */}
          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", padding: 20, marginBottom: 16 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: "#0f172a", marginBottom: 12 }}>Send Invitation</div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
              <div style={{ flex: "1 1 200px" }}>
                <label style={{ fontSize: 11, fontWeight: 600, color: "#64748b", display: "block", marginBottom: 4 }}>Email Address</label>
                <input type="email" value={newInviteEmail} onChange={e => setNewInviteEmail(e.target.value)} placeholder="captain@email.com"
                  style={{ width: "100%", padding: "8px 12px", borderRadius: 6, border: "1px solid #c1cad8", fontSize: 13, background: "#f5f7fb", outline: "none", boxSizing: "border-box" }} />
              </div>
              <div style={{ flex: "0 0 160px" }}>
                <label style={{ fontSize: 11, fontWeight: 600, color: "#64748b", display: "block", marginBottom: 4 }}>Role</label>
                <select value={newInviteRole} onChange={e => setNewInviteRole(e.target.value)}
                  style={{ width: "100%", padding: "8px 12px", borderRadius: 6, border: "1px solid #c1cad8", fontSize: 13, background: "#f5f7fb", cursor: "pointer" }}>
                  <option value="captain">Captain</option>
                  <option value="vice_captain">Vice Captain</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <button onClick={sendInvite} disabled={sendingInvite || !newInviteEmail}
                style={{ padding: "8px 20px", borderRadius: 6, border: "none", background: "linear-gradient(135deg, #0f172a, #1e3a5f)", color: "#7dd3fc", fontWeight: 600, fontSize: 13, cursor: sendingInvite ? "wait" : "pointer", opacity: sendingInvite || !newInviteEmail ? 0.6 : 1 }}>
                {sendingInvite ? "Sending..." : "Send Invite"}
              </button>
            </div>
            <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 8 }}>Invitations expire after 7 days. The recipient will use the link to create their account.</div>
          </div>

          {/* Invite list */}
          <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{ background: "linear-gradient(135deg, #0f172a 0%, #162d50 100%)", color: ACCENT }}>
                  {["Email", "Role", "Status", "Created", "Link"].map(h => (
                    <th key={h} style={{ padding: "12px 16px", textAlign: "left", fontWeight: 600, fontSize: 11, letterSpacing: 0.5 }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {invites.length === 0 ? (
                  <tr><td colSpan={5} style={{ padding: 30, textAlign: "center", color: "#94a3b8", fontSize: 13 }}>No invitations sent yet</td></tr>
                ) : invites.map((inv, i) => {
                  const expired = new Date(inv.expires_at) < new Date();
                  const status = inv.used ? "Used" : expired ? "Expired" : "Pending";
                  const statusColor = inv.used ? "#16a34a" : expired ? "#dc2626" : "#f59e0b";
                  const statusBg = inv.used ? "#dcfce7" : expired ? "#fee2e2" : "#fef3c7";
                  const inviteUrl = `${window.location.origin}${window.location.pathname}?invite=${inv.token}`;
                  return (
                    <tr key={inv.id} style={{ background: i % 2 === 0 ? "#fff" : "#f5f7fb", borderBottom: "1px solid #e2e8f0" }}>
                      <td style={{ padding: "12px 16px", fontWeight: 600 }}>{inv.email}</td>
                      <td style={{ padding: "12px 16px" }}>
                        <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: (ROLE_CONFIG[inv.role] || ROLE_CONFIG.vice_captain).bg, color: (ROLE_CONFIG[inv.role] || ROLE_CONFIG.vice_captain).color }}>
                          {(ROLE_CONFIG[inv.role] || ROLE_CONFIG.vice_captain).label}
                        </span>
                      </td>
                      <td style={{ padding: "12px 16px" }}>
                        <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: statusBg, color: statusColor }}>{status}</span>
                      </td>
                      <td style={{ padding: "12px 16px", color: "#94a3b8", fontSize: 11 }}>
                        {new Date(inv.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" })}
                      </td>
                      <td style={{ padding: "12px 16px" }}>
                        {!inv.used && !expired && (
                          <button onClick={() => { navigator.clipboard.writeText(inviteUrl); setFeedback({ type: "success", msg: "Invite link copied!" }); setTimeout(() => setFeedback(null), 3000); }}
                            style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #c1cad8", background: "#f8fafc", color: "#0f172a", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                            Copy Link
                          </button>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <div style={{ padding: "12px 16px", background: "#f5f7fb", borderTop: "1px solid #e2e8f0", fontSize: 11, color: "#64748b" }}>
              {invites.length} invitation{invites.length !== 1 ? "s" : ""} total
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PLATFORM ADMIN (platform_admin only — cross-club management)
// ═══════════════════════════════════════════════════════════════
const IconPlatform = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>);

function PlatformAdmin({ currentUserId }) {
  const [clubs, setClubs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [feedback, setFeedback] = useState(null);
  const [processing, setProcessing] = useState(null);

  useEffect(() => { loadClubs(); }, []);

  async function loadClubs() {
    setLoading(true);
    const { data, error } = await supabase.from("clubs").select("*").order("created_at", { ascending: false });
    if (data) setClubs(data);
    if (error) setFeedback({ type: "error", msg: "Failed to load clubs: " + error.message });
    setLoading(false);
  }

  async function approveClub(club) {
    setProcessing(club.id);
    setFeedback(null);
    // Update club status to approved
    const { error: updateErr } = await supabase.from("clubs").update({ status: "approved", verified: true }).eq("id", club.id);
    if (updateErr) {
      setFeedback({ type: "error", msg: "Failed to approve: " + updateErr.message });
      setProcessing(null);
      return;
    }
    // Auto-create admin invitation for the pro
    const { data: inviteData, error: inviteErr } = await supabase.from("invitations").insert({
      email: club.pro_email,
      club: club.name,
      role: "admin",
      invited_by: currentUserId,
    }).select("token").single();
    if (inviteErr) {
      setFeedback({ type: "error", msg: "Club approved but invite creation failed: " + inviteErr.message });
    } else {
      const inviteUrl = `${window.location.origin}${window.location.pathname}?invite=${inviteData.token}`;
      setClubs(prev => prev.map(c => c.id === club.id ? { ...c, status: "approved", verified: true } : c));
      setFeedback({ type: "success", msg: `${club.name} approved! Send this invite link to ${club.pro_email}: ${inviteUrl}` });
    }
    setProcessing(null);
  }

  async function rejectClub(clubId) {
    setProcessing(clubId);
    const { error } = await supabase.from("clubs").update({ status: "rejected" }).eq("id", clubId);
    if (error) {
      setFeedback({ type: "error", msg: "Failed to reject: " + error.message });
    } else {
      setClubs(prev => prev.map(c => c.id === clubId ? { ...c, status: "rejected" } : c));
      setFeedback({ type: "success", msg: "Club registration rejected." });
      setTimeout(() => setFeedback(null), 3000);
    }
    setProcessing(null);
  }

  const pending = clubs.filter(c => c.status === "pending");
  const approved = clubs.filter(c => c.status === "approved");
  const rejected = clubs.filter(c => c.status === "rejected");

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 20, fontWeight: 600, color: "#0f172a" }}>Platform Administration</h2>
          <p style={{ margin: "4px 0 0", fontSize: 13, color: "#64748b" }}>Approve club registrations and manage the MatchGapper platform</p>
        </div>
        <button onClick={loadClubs} style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #c1cad8", background: "#fff", color: "#0f172a", fontWeight: 600, cursor: "pointer", fontSize: 12 }}>Refresh</button>
      </div>

      {feedback && (
        <div style={{ background: feedback.type === "error" ? "#fee2e2" : "#dcfce7", color: feedback.type === "error" ? "#991b1b" : "#166534", padding: "12px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, marginBottom: 14, wordBreak: "break-all" }}>{feedback.msg}</div>
      )}

      {loading ? (
        <div style={{ textAlign: "center", padding: 40, color: "#64748b" }}>Loading clubs...</div>
      ) : (
        <>
          {/* Pending registrations */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: "#0f172a", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
              Pending Registrations
              {pending.length > 0 && <span style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 10, background: "#fef3c7", color: "#92400e" }}>{pending.length}</span>}
            </div>
            {pending.length === 0 ? (
              <div style={{ background: "#f5f7fb", borderRadius: 10, padding: 24, textAlign: "center", color: "#94a3b8", fontSize: 13 }}>No pending registrations</div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {pending.map(club => (
                  <div key={club.id} style={{ background: "#fff", borderRadius: 12, border: "2px solid #fbbf24", padding: 20, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                    <div>
                      <div style={{ fontSize: 16, fontWeight: 600, color: "#0f172a" }}>{club.name}</div>
                      <div style={{ fontSize: 13, color: "#64748b", marginTop: 2 }}>
                        PGA Pro: <strong>{club.pro_name}</strong> &middot; {club.pro_email}
                      </div>
                      <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 4 }}>
                        Submitted {new Date(club.created_at).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button onClick={() => approveClub(club)} disabled={processing === club.id}
                        style={{ padding: "8px 20px", borderRadius: 8, border: "none", background: "#16a34a", color: "#fff", fontWeight: 600, fontSize: 13, cursor: processing === club.id ? "wait" : "pointer" }}>
                        {processing === club.id ? "..." : "Approve & Create Invite"}
                      </button>
                      <button onClick={() => rejectClub(club.id)} disabled={processing === club.id}
                        style={{ padding: "8px 16px", borderRadius: 8, border: "1px solid #fca5a5", background: "#fff5f5", color: "#dc2626", fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                        Reject
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Approved clubs */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: "#0f172a", marginBottom: 10 }}>
              Active Clubs <span style={{ fontSize: 11, fontWeight: 600, color: "#64748b" }}>({approved.length})</span>
            </div>
            <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ background: "linear-gradient(135deg, #0f172a 0%, #162d50 100%)", color: ACCENT }}>
                    {["Club", "PGA Pro", "Email", "Approved"].map(h => (
                      <th key={h} style={{ padding: "12px 16px", textAlign: "left", fontWeight: 600, fontSize: 11, letterSpacing: 0.5 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {approved.length === 0 ? (
                    <tr><td colSpan={4} style={{ padding: 24, textAlign: "center", color: "#94a3b8" }}>No approved clubs yet</td></tr>
                  ) : approved.map((club, i) => (
                    <tr key={club.id} style={{ background: i % 2 === 0 ? "#fff" : "#f5f7fb", borderBottom: "1px solid #e2e8f0" }}>
                      <td style={{ padding: "12px 16px", fontWeight: 600 }}>{club.name}</td>
                      <td style={{ padding: "12px 16px" }}>{club.pro_name}</td>
                      <td style={{ padding: "12px 16px", color: "#64748b", fontSize: 12 }}>{club.pro_email}</td>
                      <td style={{ padding: "12px 16px", color: "#94a3b8", fontSize: 11 }}>{new Date(club.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Rejected (collapsible) */}
          {rejected.length > 0 && (
            <div>
              <div style={{ fontSize: 13, fontWeight: 600, color: "#94a3b8", marginBottom: 8 }}>Rejected ({rejected.length})</div>
              {rejected.map(club => (
                <div key={club.id} style={{ fontSize: 12, color: "#94a3b8", padding: "4px 0" }}>{club.name} — {club.pro_email}</div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ROOT COMPONENT (with Supabase Auth)
// ═══════════════════════════════════════════════════════════════
function GAPManager() {
  const { session, profile, loading, signIn, signUp, signOut, fetchProfile } = useAuth();
  const [activeTab, setActiveTab] = useState("dashboard");
  const [players, setPlayers] = useState([]);
  const [playersLoaded, setPlayersLoaded] = useState(false);
  const [schedule, setSchedule] = useState(DEFAULT_SCHEDULE);
  const [lockState, setLockState] = useState(DEFAULT_LOCK_STATE);
  const [appScreen, setAppScreen] = useState("main"); // "main", "register_club"
  const [inviteData, setInviteData] = useState(null); // holds validated invite info
  const [inviteLoading, setInviteLoading] = useState(false);

  // Check for invite token in URL on mount
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const inviteToken = params.get("invite");
    if (inviteToken) {
      setInviteLoading(true);
      supabase.from("invitations").select("*").eq("token", inviteToken).single().then(({ data, error }) => {
        if (data && !data.used && new Date(data.expires_at) > new Date()) {
          setInviteData({ ...data, token: inviteToken });
        }
        setInviteLoading(false);
      });
    }
  }, []);

  // Derive role from profile — default to vice_captain for safety
  const userRole = profile?.role || "vice_captain";
  const isAdmin = userRole === "admin";
  const isCaptain = userRole === "captain" || isAdmin;
  const isPlatformAdmin = profile?.platform_admin === true;
  const rc = ROLE_CONFIG[userRole] || ROLE_CONFIG.vice_captain;
  const clubName = profile?.club || "My Club";
  const clubInitial = clubName.charAt(0).toUpperCase();

  // Load players from Supabase when profile is ready
  useEffect(() => {
    if (profile?.club && profile?.onboarded) {
      loadPlayersFromDb(profile.club).then(dbPlayers => {
        setPlayers(dbPlayers);
        setPlayersLoaded(true);
      });
    }
  }, [profile?.club, profile?.onboarded]);

  // Wrapper to save player changes to Supabase
  const setPlayersWithSync = useCallback((updater) => {
    setPlayers(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      // Find changed players and sync to DB
      next.forEach(p => {
        const old = prev.find(op => op.id === p.id);
        if (!old || JSON.stringify(old) !== JSON.stringify(p)) {
          savePlayerToDb(p, clubName, session?.user?.id);
        }
      });
      // Find deleted players
      prev.forEach(p => {
        if (!next.find(np => np.id === p.id)) {
          deletePlayerFromDb(p.id);
        }
      });
      return next;
    });
  }, [clubName, session?.user?.id]);

  // Handle new player add (needs to get DB id back)
  const addPlayerWithSync = useCallback(async (newPlayer) => {
    const row = appPlayerToDb(newPlayer, clubName, session?.user?.id);
    delete row.id;
    const { data, error } = await supabase.from("players").insert(row).select("*").single();
    if (data) {
      setPlayers(prev => [...prev, dbPlayerToApp(data)]);
      return data.id;
    }
    return null;
  }, [clubName, session?.user?.id]);

  if (loading) {
    return (
      <div style={{ fontFamily: "'Poppins', sans-serif", background: "#eef2f7", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ textAlign: "center", color: "#64748b" }}>
          <div style={{ width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg, #7dd3fc, #38bdf8)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 600, color: "#0f172a", marginBottom: 16 }}>M</div>
          <div style={{ fontSize: 16, fontWeight: 600 }}>Loading...</div>
        </div>
      </div>
    );
  }

  if (!session) {
    if (inviteLoading) {
      return (
        <div style={{ fontFamily: "'Poppins', sans-serif", background: "#eef2f7", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ textAlign: "center", color: "#64748b" }}>
            <div style={{ width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg, #7dd3fc, #38bdf8)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 600, color: "#0f172a", marginBottom: 16 }}>M</div>
            <div style={{ fontSize: 16, fontWeight: 600 }}>Validating invitation...</div>
          </div>
        </div>
      );
    }
    if (inviteData) {
      return <InviteSignup invite={inviteData} onSignUp={signUp} onBack={() => { setInviteData(null); window.history.replaceState({}, "", window.location.pathname); }} />;
    }
    if (appScreen === "register_club") {
      return <ClubRegistration onBack={() => setAppScreen("main")} />;
    }
    return <LoginScreen onSignIn={signIn} onSignUp={signUp} onRegisterClub={() => setAppScreen("register_club")} />;
  }

  // Show onboarding wizard for new users
  if (profile && !profile.onboarded) {
    return <OnboardingWizard profile={profile} session={session} onComplete={() => {
      fetchProfile(session.user.id);
    }} />;
  }

  const tabs = [
    { id: "dashboard", label: "Dashboard", Icon: IconDashboard },
    { id: "builder", label: "Team Builder", Icon: IconBuilder },
    { id: "roster", label: "Roster", Icon: IconRoster },
    { id: "setup", label: "Season Setup", Icon: IconSetup },
    ...(isAdmin ? [{ id: "admin", label: "Admin", Icon: IconAdmin }] : []),
    ...(isPlatformAdmin ? [{ id: "platform", label: "Platform", Icon: IconPlatform }] : []),
  ];

  return (
    <div style={{ fontFamily: "'Poppins', 'Segoe UI', -apple-system, sans-serif", background: "#eef2f7", minHeight: "100vh", color: "#0f172a" }}>
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
      <header style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)", padding: "0 24px", borderBottom: "3px solid #7dd3fc" }}>
        <div style={{ maxWidth: 1400, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <div style={{ width: 42, height: 42, borderRadius: "50%", background: "linear-gradient(135deg, #7dd3fc, #38bdf8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, fontWeight: 600, color: "#0f172a" }}>{clubInitial}</div>
            <div>
              <div style={{ color: "#7dd3fc", fontSize: 20, fontWeight: 600, lineHeight: 1.1 }}>{clubName}</div>
              <div style={{ color: "#94a3b8", fontSize: 11, letterSpacing: 1 }}>BMW GAP TEAM MATCHES 2026</div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <nav style={{ display: "flex", gap: 2 }}>
              {tabs.map(t => (
                <button key={t.id} onClick={() => setActiveTab(t.id)} style={{ padding: "16px 20px", background: activeTab === t.id ? "#7dd3fc15" : "transparent", border: "none", borderBottom: activeTab === t.id ? "3px solid #7dd3fc" : "3px solid transparent", color: activeTab === t.id ? "#7dd3fc" : "#94a3b8", cursor: "pointer", fontSize: 13, fontWeight: 600, transition: "all 0.2s", display: "flex", alignItems: "center", gap: 6 }}>
                  <t.Icon /> {t.label}
                </button>
              ))}
            </nav>
            {/* User Info & Role Badge */}
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: "#cbd5e1", fontSize: 12, fontWeight: 600 }}>{profile?.full_name || session.user.email}</div>
                <span style={{ fontSize: 9, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: rc.bg, color: rc.color, letterSpacing: 0.5 }}>{rc.label.toUpperCase()}</span>
              </div>
              <button onClick={signOut} style={{ padding: "6px 12px", borderRadius: 6, border: "1px solid #334155", background: "transparent", color: "#94a3b8", fontSize: 11, fontWeight: 600, cursor: "pointer" }} title="Sign out">
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </header>
      <main style={{ maxWidth: 1400, margin: "0 auto", padding: "24px" }}>
        {activeTab === "dashboard" && <Dashboard players={players} schedule={schedule} lockState={lockState} clubName={clubName} />}
        {activeTab === "roster" && <Roster players={players} setPlayers={setPlayersWithSync} addPlayerWithSync={addPlayerWithSync} clubName={clubName} userId={session.user.id} schedule={schedule} />}
        {activeTab === "builder" && <TeamBuilder players={players} schedule={schedule} lockState={lockState} setLockState={setLockState} userRole={userRole} clubName={clubName} />}
        {activeTab === "setup" && <SeasonSetup schedule={schedule} setSchedule={setSchedule} lockState={lockState} userRole={userRole} clubName={clubName} />}
        {activeTab === "admin" && isAdmin && <AdminPanel currentUserId={session.user.id} clubName={clubName} />}
        {activeTab === "platform" && isPlatformAdmin && <PlatformAdmin currentUserId={session.user.id} />}
      </main>
      <footer style={{ textAlign: "center", padding: "16px", color: "#64748b", fontSize: 11, borderTop: "1px solid #d1d9e6" }}>MatchGapper · BMW GAP Team Match Manager · All matches scratch — no handicap strokes</footer>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(GAPManager));
  </script>
</body>
</html>
