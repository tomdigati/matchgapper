        <div style={{ width: compact ? 28 : 32, height: compact ? 28 : 32, borderRadius: "50%", background: `linear-gradient(135deg, ${s.color}22, ${s.color}44)`, border: `2px solid ${s.color}`, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 600, fontSize: compact ? 11 : 13, color: s.color, flexShrink: 0 }}>{fmtH(player.courseHdcp)}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontWeight: 600, color: "#0f172a", fontSize: compact ? 11 : 13 }}>{player.name}</div>
          {!compact && <div style={{ fontSize: 11, color: "#64748b" }}>Idx: {player.index} · {player.ghin}</div>}
        </div>
        <div style={{ display: "flex", gap: 4, alignItems: "center", flexShrink: 0 }}>
          {pref && <span style={{ fontSize: 9, fontWeight: 600, padding: "2px 5px", borderRadius: 4, background: pref === "Home" ? "#dbeafe" : "#fef3c7", color: pref === "Home" ? "#1e40af" : "#92400e" }}>{pref === "Home" ? "H" : "A"}</span>}
          {avail && <span style={{ width: 8, height: 8, borderRadius: "50%", background: AVAIL_COLORS[avail] }} />}
          <span style={{ fontSize: 9, padding: "2px 5px", borderRadius: 4, background: s.bg, color: s.color, fontWeight: 600 }}>{s.short}</span>
        </div>
      </div>
      {hover && <Tooltip player={player} position={tooltipPos} threshold={threshold} />}
    </>
  );
}

// ═══════════════════════════════════════════════════════════════
// PAIR SLOT & ARCHETYPES
// ═══════════════════════════════════════════════════════════════
const PAIR_ARCHETYPES = {
  anchor: { label: "Anchor", emoji: "⚓", color: "#0369a1", bg: "#e0f2fe", tip: "Elite floor + upside partner. The low player covers par, partner plays free." },
  stacked: { label: "Stacked", emoji: "🔥", color: "#b91c1c", bg: "#fee2e2", tip: "Two elite players loaded up. Aggressive — bet on dominating this foursome." },
  balanced: { label: "Balanced", emoji: "⚖️", color: "#15803d", bg: "#dcfce7", tip: "Similar handicaps, steady and predictable. Win on consistency." },
  gambit: { label: "Gambit", emoji: "🎲", color: "#7e22ce", bg: "#f3e8ff", tip: "Higher handicaps together. Rolling the dice to stack firepower elsewhere." },
};

function detectArchetype(p1, p2) {
  if (!p1 || !p2) return null;
  const lo = Math.min(p1.courseHdcp, p2.courseHdcp), hi = Math.max(p1.courseHdcp, p2.courseHdcp), spread = hi - lo;
  if (lo <= 4 && hi >= 12) return "anchor";
  if (lo <= 5 && hi <= 7 && spread <= 4) return "stacked";
  if (lo >= 13) return "gambit";
  if (lo <= 4 && spread >= 5) return "anchor";
  if (lo <= 5 && hi <= 9) return "stacked";
  if (spread <= 3) return "balanced";
  if (spread >= 6) return "anchor";
  return "balanced";
}

function PairSlot({ pair, pairNum, onDrop, onRemove, players, side, week, threshold, disabled, teeOffset, baseTee }) {
  const [dragOver, setDragOver] = useState(false);
  const [showTip, setShowTip] = useState(false);
  const p1 = pair[0] ? players.find(p => p.id === pair[0]) : null;
  const p2 = pair[1] ? players.find(p => p.id === pair[1]) : null;
  const avg = p1 && p2 ? ((p1.courseHdcp + p2.courseHdcp) / 2).toFixed(1) : p1 ? p1.courseHdcp.toFixed(1) : p2 ? p2.courseHdcp.toFixed(1) : "—";
  const archetype = detectArchetype(p1, p2);
  const arch = archetype ? PAIR_ARCHETYPES[archetype] : null;
  const prefWarnings = [];
  if (p1 && week && p1.locPref[week] && p1.locPref[week] !== side) prefWarnings.push(p1.name.split(",")[0]);
  if (p2 && week && p2.locPref[week] && p2.locPref[week] !== side) prefWarnings.push(p2.name.split(",")[0]);
  const pairTee = baseTee && teeOffset !== undefined ? addMinutes(baseTee, teeOffset) : null;
  return (
    <div onDragOver={(e) => { if (!disabled) { e.preventDefault(); setDragOver(true); } }} onDragLeave={() => setDragOver(false)}
      onDrop={(e) => { if (!disabled) { e.preventDefault(); setDragOver(false); onDrop(parseInt(e.dataTransfer.getData("text/plain"))); } }}
      style={{ background: dragOver ? "#eff6ff" : "#f5f7fb", border: `2px dashed ${dragOver ? "#16a34a" : disabled ? "#e2e8f0" : "#c1cad8"}`, borderRadius: 10, padding: 12, minHeight: 90, transition: "all 0.2s", opacity: disabled ? 0.7 : 1 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: "#64748b", letterSpacing: 1 }}>PAIR {pairNum}</span>
          {pairTee && <span style={{ fontSize: 10, fontWeight: 600, color: "#475569", background: "#e2e8f0", padding: "1px 6px", borderRadius: 4 }}>{pairTee}</span>}
        </div>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {arch && (
            <div style={{ position: "relative", display: "inline-flex" }}>
              <span onMouseEnter={() => setShowTip(true)} onMouseLeave={() => setShowTip(false)}
                style={{ fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 5, background: arch.bg, color: arch.color, cursor: "help", display: "flex", alignItems: "center", gap: 3, border: `1px solid ${arch.color}33` }}>
                {arch.emoji} {arch.label}
              </span>
              {showTip && (
                <div style={{ position: "absolute", bottom: "100%", right: 0, marginBottom: 6, background: "#0f172a", color: "#eef2f7", padding: "8px 12px", borderRadius: 8, fontSize: 11, lineHeight: 1.4, width: 220, boxShadow: "0 4px 16px rgba(0,0,0,0.3)", zIndex: 100, pointerEvents: "none" }}>
                  <div style={{ fontWeight: 600, color: ACCENT, marginBottom: 3 }}>{arch.emoji} {arch.label} Pairing</div>
                  {arch.tip}
                </div>
              )}
            </div>
          )}
          <span style={{ fontSize: 12, fontWeight: 600, color: "#0f172a", background: "#dce3ed", borderRadius: 6, padding: "2px 8px" }}>Avg: {avg}</span>
        </div>
      </div>
      {prefWarnings.length > 0 && <div style={{ fontSize: 10, color: "#92400e", background: "#fef3c7", borderRadius: 4, padding: "3px 6px", marginBottom: 6 }}>Pref conflict: {prefWarnings.join(", ")} prefers {side === "Home" ? "Away" : "Home"}</div>}
      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {[0, 1].map(slot => {
          const player = slot === 0 ? p1 : p2;
          return player ? (
            <div key={slot} style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <div style={{ flex: 1 }}><PlayerCard player={player} compact week={week} threshold={threshold} /></div>
              {!disabled && <button onClick={() => onRemove(player.id)} style={{ width: 22, height: 22, borderRadius: "50%", border: "1px solid #e5d5d5", background: "#fff5f5", color: "#dc2626", cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>×</button>}
            </div>
          ) : (
            <div key={slot} style={{ height: 38, border: `1px dashed ${disabled ? "#e2e8f0" : "#b8c2d1"}`, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", color: "#94a3b8", fontSize: 11 }}>{disabled ? "Locked" : "Drop player here"}</div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TEAM BUILDER (with Lock/Unlock flow)
// ═══════════════════════════════════════════════════════════════
function TeamBuilder({ players, schedule, lockState, setLockState, userRole, clubName }) {
  const isAdmin = userRole === "admin" || userRole === "captain";
  const [activeWeek, setActiveWeek] = useState(1);
  const emptyWeek = (teamCount) => {
    const w = {};
    for (let i = 0; i < teamCount; i++) {
      w[i] = { home: [[], [], []], away: [[], [], []] };
    }
    return w;
  };
  const [assignments, setAssignments] = useState(() => {
    const init = {};
    [1, 2, 3].forEach(w => { init[w] = emptyWeek(schedule[w]?.teamCount || 2); });
    return init;
  });
  const [validationMsg, setValidationMsg] = useState(null);
  const [copyFeedback, setCopyFeedback] = useState(null);
  const weekSched = schedule[activeWeek];
  const weekLock = lockState[activeWeek];
  const isLocked = weekLock.locked;
  const teamCount = weekSched.teamCount || 2;
  const teamIndices = Array.from({length: teamCount}, (_, i) => i);
  const split = useMemo(() => computeTeamSplit(players, activeWeek, teamCount), [players, activeWeek, teamCount]);

  // Ensure assignments have entries for all teams when teamCount changes
  useEffect(() => {
    setAssignments(prev => {
      const w = prev[activeWeek] || {};
      let changed = false;
      const next = { ...w };
      for (let i = 0; i < teamCount; i++) {
        if (!next[i]) { next[i] = { home: [[], [], []], away: [[], [], []] }; changed = true; }
      }
      if (changed) return { ...prev, [activeWeek]: next };
      return prev;
    });
  }, [activeWeek, teamCount]);

  const assignedIds = useMemo(() => {
    const w = assignments[activeWeek] || {}; const ids = new Set();
    teamIndices.forEach(t => { const tw = w[t]; if (tw) ["home", "away"].forEach(s => (tw[s] || []).forEach(pair => pair.forEach(id => ids.add(id)))); });
    return ids;
  }, [assignments, activeWeek, teamCount]);
  const availablePlayers = useMemo(() => players.filter(p => p.availability[activeWeek] === "yes" && !assignedIds.has(p.id)).sort((a, b) => a.courseHdcp - b.courseHdcp), [players, activeWeek, assignedIds]);
  const maybePlayers = useMemo(() => players.filter(p => p.availability[activeWeek] === "maybe").sort((a, b) => a.courseHdcp - b.courseHdcp), [players, activeWeek]);

  const validate = useCallback((na) => {
    const w = na[activeWeek] || {};
    const teamPlayers = [];
    teamIndices.forEach(t => {
      const tp = [];
      const tw = w[t];
      if (tw) ["home", "away"].forEach(s => (tw[s] || []).forEach(pair => pair.forEach(id => { const p = players.find(pl => pl.id === id); if (p) tp.push(p); })));
      teamPlayers.push(tp);
    });
    for (let i = 0; i < teamPlayers.length - 1; i++) {
      if (teamPlayers[i].length > 0 && teamPlayers[i+1].length > 0) {
        const hiMax = Math.max(...teamPlayers[i].map(p => p.courseHdcp));
        const loMin = Math.min(...teamPlayers[i+1].map(p => p.courseHdcp));
        if (loMin < hiMax) return `VIOLATION: Team ${i+2} has a player at ${fmtH(loMin)} hdcp, lower than Team ${i+1}'s highest (${fmtH(hiMax)}). GAP rules require Team ${i+2} handicaps >= Team ${i+1}'s highest.`;
      }
    }
    return null;
  }, [activeWeek, players, teamCount]);

  const handleDrop = (teamIdx, side, pairIdx, playerId) => {
    if (isLocked) return;
    const player = players.find(p => p.id === playerId);
    if (!player) return;
    // Validate team band
    if (split.thresholds.length > 0) {
      const projIdx = projectTeam(player, split.thresholds);
      if (projIdx !== teamIdx) {
        const lo = teamIdx === 0 ? null : split.thresholds[teamIdx - 1];
        const hi = teamIdx < split.thresholds.length ? split.thresholds[teamIdx] : null;
        setValidationMsg(`BLOCKED: ${player.name} (hdcp ${fmtH(player.courseHdcp)}) projects to Team ${projIdx+1}, not Team ${teamIdx+1}.`);
        return;
      }
    }
    setAssignments(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const w = next[activeWeek] || {};
      teamIndices.forEach(t => { const tw = w[t]; if (tw) ["home", "away"].forEach(s => (tw[s] || []).forEach(pair => { const idx = pair.indexOf(playerId); if (idx > -1) pair.splice(idx, 1); })); });
      if (w[teamIdx] && w[teamIdx][side][pairIdx].length < 2) w[teamIdx][side][pairIdx].push(playerId);
      next[activeWeek] = w;
      setValidationMsg(validate(next)); return next;
    });
    if (weekLock.lastSentAt) {
      setLockState(prev => ({ ...prev, [activeWeek]: { ...prev[activeWeek], modifiedAfterLock: true } }));
    }
  };

  const handleRemove = (playerId) => {
    if (isLocked) return;
    setAssignments(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const w = next[activeWeek] || {};
      teamIndices.forEach(t => { const tw = w[t]; if (tw) ["home", "away"].forEach(s => (tw[s] || []).forEach(pair => { const idx = pair.indexOf(playerId); if (idx > -1) pair.splice(idx, 1); })); });
      next[activeWeek] = w;
      setValidationMsg(validate(next)); return next;
    });
    if (weekLock.lastSentAt) {
      setLockState(prev => ({ ...prev, [activeWeek]: { ...prev[activeWeek], modifiedAfterLock: true } }));
    }
  };

  const handleLock = () => {
    setLockState(prev => ({ ...prev, [activeWeek]: { ...prev[activeWeek], locked: true, lockedAt: new Date().toLocaleString(), lockedBy: "Admin" } }));
  };
  const handleUnlock = () => {
    setLockState(prev => ({ ...prev, [activeWeek]: { ...prev[activeWeek], locked: false } }));
  };

  const buildSummary = () => {
    const ws = schedule[activeWeek];
    const w = assignments[activeWeek] || {};
    let text = `${clubName.toUpperCase()} — BMW GAP TEAM MATCHES\nWeek ${activeWeek} · ${fmtDateLong(ws.date)}\n${"═".repeat(50)}\n`;
    (ws.teams || []).forEach((ts, idx) => {
      const tc = TEAM_COLORS[idx] || TEAM_COLORS[0];
      text += `\n${tc.label} vs ${ts.opponent} ${ts.teamNum}\nHome Tee (${clubName}): ${ts.homeTee || "TBD"} — Away Tee: ${ts.awayTee || "TBD"}\n(${ts.interval || 10}-min intervals)\n${"─".repeat(40)}\n`;
      const tw = w[idx];
      if (tw) {
        ["home", "away"].forEach(side => {
          const loc = side === "home" ? clubName : ts.opponent;
          const baseTee = side === "home" ? ts.homeTee : ts.awayTee;
          (tw[side] || []).forEach((pair, i) => {
            const names = pair.map(id => { const p = players.find(pl => pl.id === id); return p ? `${p.name} (${fmtH(p.courseHdcp)})` : "TBD"; });
            const pairTee = addMinutes(baseTee, i * (ts.interval || 10));
            if (names.length > 0) text += `  ${side.toUpperCase()} Pair ${i+1} @ ${pairTee} at ${loc}: ${names.join(" & ")}\n`;
          });
        });
      }
    });
    return text;
  };

  const handleCopy = () => {
    const text = buildSummary();
    navigator.clipboard?.writeText(text);
    setLockState(prev => ({ ...prev, [activeWeek]: { ...prev[activeWeek], lastSentAt: new Date().toLocaleString(), modifiedAfterLock: false } }));
    setCopyFeedback("Copied to clipboard!");
    setTimeout(() => setCopyFeedback(null), 3000);
  };

  const handleMail = () => {
    const text = buildSummary();
    setLockState(prev => ({ ...prev, [activeWeek]: { ...prev[activeWeek], lastSentAt: new Date().toLocaleString(), modifiedAfterLock: false } }));
    window.open(`mailto:?subject=${encodeURIComponent(`${clubName} Week ${activeWeek} Pairings — ${fmtDateLong(schedule[activeWeek].date)}`)}&body=${encodeURIComponent(text)}`);
  };

  const countAssigned = (teamIdx) => { const w = assignments[activeWeek] || {}; const tw = w[teamIdx]; let c = 0; if (tw) ["home", "away"].forEach(s => (tw[s] || []).forEach(pair => c += pair.length)); return c; };

  // Build pool lists per team
  const teamPools = useMemo(() => {
    return teamIndices.map(idx => {
      return availablePlayers.filter(p => {
        const proj = projectTeam(p, split.thresholds);
        return proj === idx;
      });
    });
  }, [availablePlayers, split.thresholds, teamCount]);

  return (
    <div>
      {/* STALE COPY WARNING */}
      {weekLock.modifiedAfterLock && (
        <div style={{ background: "linear-gradient(90deg, #7f1d1d, #991b1b)", border: "2px solid #dc2626", borderRadius: 10, padding: "12px 18px", marginBottom: 14, display: "flex", alignItems: "center", gap: 12, color: "#fecaca" }}>
          <span style={{ fontSize: 20 }}>⚠</span>
          <div>
            <div style={{ fontWeight: 600, fontSize: 14, color: "#fff" }}>Pairings modified since last send — re-notify opposing club</div>
            <div style={{ fontSize: 12, opacity: 0.8 }}>Last sent: {weekLock.lastSentAt}. Changes have been made. The opposing club has a stale copy.</div>
          </div>
          {isAdmin && <button onClick={handleCopy} style={{ marginLeft: "auto", padding: "8px 16px", borderRadius: 6, border: "none", background: "#dc2626", color: "#fff", fontWeight: 600, cursor: "pointer", fontSize: 12, whiteSpace: "nowrap" }}>Re-Copy & Send</button>}
        </div>
      )}

      {/* Week Selector */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {[1, 2, 3].map(w => {
          const ls = lockState[w];
          const tc = schedule[w]?.teamCount || 2;
          return (
            <button key={w} onClick={() => { setActiveWeek(w); setValidationMsg(null); }} style={{ flex: 1, padding: "10px 14px", borderRadius: 8, border: activeWeek === w ? "2px solid #0f172a" : "1px solid #c1cad8", background: activeWeek === w ? "linear-gradient(135deg, #0f172a 0%, #162d50 100%)" : "#fff", color: activeWeek === w ? ACCENT : "#0f172a", fontWeight: 600, cursor: "pointer", fontSize: 13, transition: "all 0.2s", position: "relative" }}>
              <div style={{ fontWeight: 600, display: "flex", alignItems: "center", gap: 6, justifyContent: "center" }}>
                Week {w} — {fmtDate(schedule[w].date)}
                {ls.locked && <IconLock />}
                {ls.modifiedAfterLock && <span style={{ width: 8, height: 8, borderRadius: "50%", background: "#dc2626", display: "inline-block" }} />}
              </div>
              <div style={{ fontSize: 10, fontWeight: 400, opacity: 0.8, marginTop: 2 }}>{tc} team{tc !== 1 ? "s" : ""}</div>
            </button>
          );
        })}
      </div>

      {/* Threshold Bar */}
      {split.thresholds.length > 0 && split.thresholds.some(t => t !== null) && (
        <div style={{ background: "#fff", border: "1px solid #d1d9e6", borderRadius: 8, padding: "10px 16px", marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
          <div style={{ fontSize: 13 }}>
            <span style={{ fontWeight: 600 }}>Team Thresholds: </span>
            {split.thresholds.map((t, i) => t !== null ? <span key={i} style={{ marginRight: 12 }}><span style={{ fontWeight: 600 }}>T{i+1}/T{i+2}: </span><span style={{ fontWeight: 600, fontSize: 16 }}>{fmtH(t)}</span></span> : null)}
          </div>
          <div style={{ display: "flex", gap: 8, fontSize: 12, flexWrap: "wrap" }}>
            {split.teams.map((team, idx) => {
              const tc = TEAM_COLORS[idx] || TEAM_COLORS[0];
              const r = split.ranges[idx];
              return <span key={idx} style={{ background: tc.bg, padding: "3px 10px", borderRadius: 6, fontWeight: 600, color: tc.color }}>T{idx+1}: {r ? `${fmtH(r.min)}–${fmtH(r.max)}` : "—"} ({team.length}p)</span>;
            })}
          </div>
        </div>
      )}

      {validationMsg && <div style={{ background: "#fef2f2", border: "2px solid #dc2626", borderRadius: 8, padding: "10px 14px", marginBottom: 12, color: "#991b1b", fontSize: 13, fontWeight: 600 }}>{validationMsg}</div>}

      {/* Main Grid */}
      <div style={{ display: "grid", gridTemplateColumns: "300px 1fr", gap: 16, minHeight: 500 }}>
        <div style={{ background: "#f5f7fb", borderRadius: 12, padding: 14, border: "1px solid #d1d9e6", maxHeight: 750, overflowY: "auto" }}>
          {teamIndices.map((idx) => {
            const tc = TEAM_COLORS[idx] || TEAM_COLORS[0];
            const pool = teamPools[idx] || [];
            const r = split.ranges[idx];
            return (
              <div key={idx}>
                {idx > 0 && <div style={{ borderTop: "2px solid #c1cad8", paddingTop: 10, marginTop: 10, marginBottom: 2 }} />}
                <div style={{ fontSize: 11, fontWeight: 600, color: tc.color, marginBottom: 2, letterSpacing: 0.5 }}>{tc.label} POOL ({pool.length})</div>
                <div style={{ fontSize: 10, color: "#64748b", marginBottom: 8 }}>
                  {idx === 0 ? `Hdcp ≤ ${split.thresholds[0] != null ? fmtH(split.thresholds[0]) : "?"}` :
                   idx === teamCount - 1 ? `Hdcp ≥ ${split.thresholds[idx-1] != null ? fmtH(split.thresholds[idx-1]) : "?"}` :
                   `${fmtH(split.thresholds[idx-1] ?? 0)} < Hdcp ≤ ${fmtH(split.thresholds[idx] ?? 99)}`}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>{pool.map(p => <PlayerCard key={p.id} player={p} compact week={activeWeek} threshold={split.thresholds} />)}</div>
              </div>
            );
          })}
          {maybePlayers.length > 0 && (
            <>
              <div style={{ borderTop: "2px solid #c1cad8", paddingTop: 10, marginTop: 10 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: "#8b5cf6", marginBottom: 2, letterSpacing: 0.5 }}>ON THE FENCE ({maybePlayers.length})</div>
                <div style={{ fontSize: 10, color: "#64748b", marginBottom: 8 }}>Team projection shown</div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                {maybePlayers.map(p => {
                  const projIdx = projectTeam(p, split.thresholds);
                  const ptc = TEAM_COLORS[projIdx] || TEAM_COLORS[0];
                  return (
                    <div key={p.id} style={{ position: "relative" }}>
                      <PlayerCard player={p} compact week={activeWeek} threshold={split.thresholds} />
                      <span style={{ position: "absolute", top: 2, right: 4, fontSize: 8, fontWeight: 600, padding: "1px 4px", borderRadius: 3, background: ptc.bg, color: ptc.color }}>T{projIdx+1}</span>
                    </div>
                  );
                })}
              </div>
            </>
          )}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {/* Lock Controls (Admin only) */}
          {isAdmin && (
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              {!isLocked ? (
                <button onClick={handleLock} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", borderRadius: 8, border: "2px solid #16a34a", background: "#dcfce7", color: "#16a34a", fontWeight: 600, cursor: "pointer", fontSize: 12 }}><IconLock /> Lock Pairings</button>
              ) : (
                <>
                  <button onClick={handleUnlock} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", borderRadius: 8, border: "2px solid #f59e0b", background: "#fef3c7", color: "#92400e", fontWeight: 600, cursor: "pointer", fontSize: 12 }}><IconUnlock /> Unlock to Edit</button>
                  <button onClick={handleCopy} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", borderRadius: 8, border: "none", background: "linear-gradient(135deg, #0f172a, #162d50)", color: "#fff", fontWeight: 600, cursor: "pointer", fontSize: 12 }}>Copy Summary</button>
                  <button onClick={handleMail} style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 16px", borderRadius: 8, border: "none", background: "linear-gradient(135deg, #1e40af, #3b82f6)", color: "#fff", fontWeight: 600, cursor: "pointer", fontSize: 12 }}>Open in Mail</button>
                </>
              )}
              {copyFeedback && <span style={{ fontSize: 12, color: "#16a34a", fontWeight: 600 }}>{copyFeedback}</span>}
              {isLocked && <span style={{ marginLeft: "auto", fontSize: 11, color: "#64748b" }}>Locked {weekLock.lockedAt} by {weekLock.lockedBy}</span>}
            </div>
          )}
          {!isAdmin && isLocked && <div style={{ fontSize: 12, padding: "8px 14px", background: "#fef3c7", borderRadius: 8, color: "#92400e", fontWeight: 600 }}>Pairings locked by Admin — editing disabled</div>}

          {teamIndices.map(teamIdx => {
            const teams = weekSched.teams || [];
            const ts = teams[teamIdx] || { opponent: "", teamNum: "", homeTee: "", awayTee: "", interval: 10 };
            const tc = TEAM_COLORS[teamIdx] || TEAM_COLORS[0];
            return (
              <div key={teamIdx} style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
                <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #162d50 100%)", padding: "10px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div><span style={{ color: tc.color, fontSize: 16, fontWeight: 600 }}>Team {teamIdx+1}</span><span style={{ color: "#94a3b8", fontSize: 12, marginLeft: 12 }}>{countAssigned(teamIdx)}/12 · vs {ts.opponent}</span>{ts.teamNum && <span style={{ color: "#fff", fontSize: 11, fontWeight: 600, marginLeft: 6, background: tc.color + "33", padding: "2px 8px", borderRadius: 4, letterSpacing: 0.5 }}>{ts.teamNum}</span>}</div>
                  <span style={{ fontSize: 11, color: "#94a3b8" }}>
                    {teamIdx === 0 ? `Hdcp ≤ ${split.thresholds[0] != null ? fmtH(split.thresholds[0]) : "?"}` :
                     teamIdx === teamCount - 1 && teamCount > 1 ? `Hdcp ≥ ${split.thresholds[teamIdx-1] != null ? fmtH(split.thresholds[teamIdx-1]) : "?"}` :
                     teamCount === 1 ? "All handicaps" : `${fmtH(split.thresholds[teamIdx-1] ?? 0)} < Hdcp ≤ ${fmtH(split.thresholds[teamIdx] ?? 99)}`}
                  </span>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0 }}>
                  {["Home", "Away"].map(side => {
                    const baseTee = side === "Home" ? ts.homeTee : ts.awayTee;
                    return (
                    <div key={side} style={{ padding: 12, borderRight: side === "Home" ? "1px solid #d1d9e6" : "none" }}>
                      <div style={{ fontSize: 11, fontWeight: 600, color: side === "Home" ? "#1e40af" : "#92400e", marginBottom: 4, display: "flex", alignItems: "center", gap: 6 }}>
                        <span style={{ width: 14, height: 14, borderRadius: 3, background: side === "Home" ? "#dbeafe" : "#fef3c7", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9 }}>{side === "Home" ? "H" : "A"}</span>
                        {side.toUpperCase()} — {side === "Home" ? clubName : ts.opponent}
                      </div>
                      <div style={{ fontSize: 10, color: "#64748b", marginBottom: 8 }}>First tee: {baseTee || "TBD"} · {(ts.interval || 10)}-min intervals</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {[0, 1, 2].map(i => (<PairSlot key={i} pair={(assignments[activeWeek]?.[teamIdx]?.[side.toLowerCase()] || [[],[],[]])[i] || []} pairNum={i + 1} onDrop={(id) => handleDrop(teamIdx, side.toLowerCase(), i, id)} onRemove={handleRemove} players={players} side={side} week={activeWeek} threshold={split.thresholds} disabled={isLocked} teeOffset={i * (ts.interval || 10)} baseTee={baseTee} />))}
                      </div>
                    </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function Dashboard({ players, schedule, lockState, clubName }) {
  const weekAnalysis = [1, 2, 3].map(w => {
    const tc = schedule[w].teamCount || 2;
    const split = computeTeamSplit(players, w, tc);
    const maybe = players.filter(p => p.availability[w] === "maybe");
    return { week: w, ...split, teamCount: tc, maybeAll: maybe, date: schedule[w].date, teams: schedule[w].teams || [], ls: lockState[w] };
  });
  const totalPlayers = players.length;
  const confirmed = players.filter(p => p.status === "confirmed").length;
  const declined = players.filter(p => p.status === "declined").length;
  const maybeP = players.filter(p => p.status === "maybe").length;
  const contacted = players.filter(p => p.status === "contacted").length;
  const notContacted = players.filter(p => p.status === "not_contacted").length;
  const overallTC = schedule[1]?.teamCount || 2;
  const overallSplit = computeTeamSplit(players, 1, overallTC);

  // Compute average handicap for all players who said yes to ANY week
  const anyYes = players.filter(p => [1,2,3].some(w => p.availability[w] === "yes"));
  const overallAvgHdcp = anyYes.length > 0 ? (anyYes.reduce((s, p) => s + p.courseHdcp, 0) / anyYes.length).toFixed(1) : "—";

  return (
    <div>
      <div style={{ fontSize: 14, fontWeight: 600, color: "#0f172a", marginBottom: 8, letterSpacing: 0.3 }}>Roster Recruitment</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 10, marginBottom: 16 }}>
        {[
          { label: "Full Roster", val: totalPlayers, color: "#0f172a", sub: "All eligible" },
          { label: "Available", val: confirmed, color: "#16a34a", sub: "Signed up" },
          { label: "Maybe", val: maybeP, color: "#8b5cf6", sub: "On the fence" },
          { label: "Contacted", val: contacted, color: "#f59e0b", sub: "No replies" },
          { label: "Declined", val: declined, color: "#dc2626", sub: "Not playing" },
          { label: "Not Contacted", val: notContacted, color: "#94a3b8", sub: "Need outreach" },
        ].map(({ label, val, color, sub }) => (
          <div key={label} style={{ background: "#fff", borderRadius: 10, padding: "14px 12px", border: "1px solid #d1d9e6", textAlign: "center" }}>
            <div style={{ fontSize: 26, fontWeight: 600, color }}>{val}</div>
            <div style={{ fontSize: 10, color: "#64748b", fontWeight: 600, letterSpacing: 0.5 }}>{label.toUpperCase()}</div>
            <div style={{ fontSize: 9, color: "#94a3b8", marginTop: 1 }}>{sub}</div>
          </div>
        ))}
      </div>

      {/* HANDICAP DISTRIBUTION — full width */}
      <div style={{ fontSize: 14, fontWeight: 600, color: "#0f172a", marginBottom: 8, letterSpacing: 0.3 }}>Handicap Distribution</div>
      <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", padding: 16, marginBottom: 16 }}>
        {(() => {
          const hdcps = players.map(p => Math.floor(p.courseHdcp));
          const minH = hdcps.length > 0 ? Math.min(...hdcps) : 0;
          const maxH = hdcps.length > 0 ? Math.max(...hdcps) : 12;
          const range = maxH - minH;
          const numBuckets = Math.min(6, Math.max(3, Math.ceil(range / 3)));
          const bucketSize = Math.max(1, Math.ceil((range + 1) / numBuckets));
          const brackets = [];
          for (let i = 0; i < numBuckets; i++) {
            const bMin = minH + i * bucketSize;
            const bMax = i === numBuckets - 1 ? maxH : minH + (i + 1) * bucketSize - 1;
            if (bMin > maxH) break;
            brackets.push({ label: bMin === bMax ? `${bMin}` : `${bMin}–${bMax}`, min: bMin, max: bMax });
          }
          const maxCount = Math.max(...brackets.map(b => players.filter(p => p.courseHdcp >= b.min && p.courseHdcp <= b.max).length), 1);
          return (
            <div style={{ display: "grid", gridTemplateColumns: `repeat(${brackets.length}, 1fr)`, gap: 12 }}>
              {brackets.map(b => {
                const all = players.filter(p => p.courseHdcp >= b.min && p.courseHdcp <= b.max);
                const conf = all.filter(p => p.status === "confirmed");
                const may = all.filter(p => p.status === "maybe");
                const nc = all.filter(p => p.status === "not_contacted" || p.status === "contacted");
                const projIdx = projectTeam({ courseHdcp: (b.min + b.max) / 2 }, overallSplit.thresholds);
                const ptc = TEAM_COLORS[projIdx] || TEAM_COLORS[0];
                return (
                  <div key={b.label}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#0f172a" }}>Hdcp {b.label}</div>
                      <span style={{ fontSize: 9, padding: "1px 5px", borderRadius: 3, background: ptc.bg, color: ptc.color, fontWeight: 600 }}>T{projIdx+1}</span>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", height: 80, justifyContent: "flex-end", borderRadius: 5, overflow: "hidden", background: "#f1f5f9", position: "relative" }}>
                      <div style={{ display: "flex", flexDirection: "column", justifyContent: "flex-end", height: "100%" }}>
                        <div style={{ height: `${(all.length / maxCount) * 100}%`, minHeight: all.length > 0 ? 8 : 0, display: "flex", flexDirection: "column", justifyContent: "flex-end" }}>
                          {nc.length > 0 && <div style={{ height: `${(nc.length / all.length) * 100}%`, minHeight: 4, background: "linear-gradient(180deg, #94a3b8, #64748b)", transition: "height 0.3s" }} />}
                          {may.length > 0 && <div style={{ height: `${(may.length / all.length) * 100}%`, minHeight: 4, background: "linear-gradient(180deg, #a78bfa, #7c3aed)", transition: "height 0.3s" }} />}
                          {conf.length > 0 && <div style={{ height: `${(conf.length / all.length) * 100}%`, minHeight: 4, background: "linear-gradient(180deg, #22c55e, #16a34a)", transition: "height 0.3s" }} />}
                        </div>
                      </div>
                    </div>
                    <div style={{ fontSize: 10, color: "#64748b", textAlign: "center", marginTop: 4 }}>{all.length} total · {conf.length} avail</div>
                  </div>
                );
              })}
            </div>
          );
        })()}
        <div style={{ display: "flex", gap: 16, marginTop: 10, fontSize: 10, color: "#64748b", justifyContent: "center" }}>
          <span style={{ display: "flex", alignItems: "center", gap: 3 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: "#16a34a" }} /> Confirmed</span>
          <span style={{ display: "flex", alignItems: "center", gap: 3 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: "#8b5cf6" }} /> Maybe</span>
          <span style={{ display: "flex", alignItems: "center", gap: 3 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: "#94a3b8" }} /> Not Yet</span>
          <span style={{ marginLeft: 12, fontWeight: 600 }}>Avg Hdcp (all rostered): {overallAvgHdcp}</span>
        </div>
      </div>

      {/* OVERALL TEAM POOLS */}
      <div style={{ fontSize: 14, fontWeight: 600, color: "#0f172a", marginBottom: 8, letterSpacing: 0.3 }}>Overall Team Pools</div>
      <div style={{ display: "grid", gridTemplateColumns: `repeat(${overallSplit.teams.length}, 1fr)`, gap: 10, marginBottom: 20 }}>
        {overallSplit.teams.map((team, idx) => {
          const tc = TEAM_COLORS[idx] || TEAM_COLORS[0];
          const r = overallSplit.ranges[idx];
          const avgHdcp = team.length > 0 ? (team.reduce((s, p) => s + p.courseHdcp, 0) / team.length).toFixed(1) : "—";
          return (
            <div key={idx} style={{ background: "#fff", borderRadius: 10, padding: "16px 14px", textAlign: "center", border: `2px solid ${tc.color}` }}>
              <div style={{ fontSize: 28, fontWeight: 600, color: tc.color }}>{team.length}</div>
              <div style={{ fontSize: 11, color: tc.color, fontWeight: 600, letterSpacing: 0.5 }}>{tc.label} POOL</div>
              <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>{r ? `Hdcp ${fmtH(r.min)} – ${fmtH(r.max)}` : "—"}</div>
              <div style={{ fontSize: 12, color: tc.color, fontWeight: 600, marginTop: 4 }}>Avg: {avgHdcp}</div>
            </div>
          );
        })}
      </div>

      {weekAnalysis.map(wa => (
        <div key={wa.week} style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden", marginBottom: 16 }}>
          <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #162d50 100%)", padding: "10px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <span style={{ color: ACCENT, fontSize: 17, fontWeight: 600 }}>Week {wa.week}</span>
              <span style={{ color: "#cbd5e1", fontSize: 13, fontWeight: 600 }}>{fmtDateLong(wa.date)}</span>
              <span style={{ color: "#94a3b8", fontSize: 11, marginLeft: 10 }}>{wa.teamCount} team{wa.teamCount !== 1 ? "s" : ""}</span>
              {wa.ls.locked && <span style={{ fontSize: 9, padding: "2px 8px", borderRadius: 4, background: "#16a34a33", color: "#4ade80", fontWeight: 600 }}>LOCKED</span>}
              {wa.ls.modifiedAfterLock && <span style={{ fontSize: 9, padding: "2px 8px", borderRadius: 4, background: "#dc262633", color: "#fca5a5", fontWeight: 600 }}>STALE</span>}
            </div>
            {wa.thresholds.length > 0 && wa.thresholds.some(t => t !== null) && (
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {wa.thresholds.map((t, i) => t !== null ? <span key={i} style={{ fontSize: 12, color: "#cbd5e1" }}><span style={{ fontWeight: 600 }}>T{i+1}/T{i+2}:</span> <span style={{ fontSize: 16, fontWeight: 600, color: ACCENT }}>{fmtH(t)}</span></span> : null)}
              </div>
            )}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: `repeat(${wa.teamCount}, 1fr)`, gap: 0 }}>
            {wa.teams.map((teamSched, idx) => {
              const tp = (wa.teams && wa.teams[idx]) ? (wa.teams[idx] || []) : [];
              const splitTeam = wa.teams ? (wa.teams[idx] ? wa.teams[idx] : []) : [];
              const teamPlayers = (wa.confirmed || []).slice(idx * 12, (idx + 1) * 12);
              const maybeTeam = wa.maybeTeams ? wa.maybeTeams[idx] || [] : [];
              const opp = teamSched.opponent || "";
              const num = teamSched.teamNum || "";
              const rangeData = wa.ranges ? wa.ranges[idx] : null;
              const have = teamPlayers.length;
              const gap = Math.max(0, 12 - have);
              const avgHdcp = teamPlayers.length > 0 ? (teamPlayers.reduce((s, p) => s + p.courseHdcp, 0) / teamPlayers.length).toFixed(1) : "—";
              const tc = TEAM_COLORS[idx] || TEAM_COLORS[0];
              return (
                <div key={idx} style={{ padding: 16, borderRight: idx < wa.teamCount - 1 ? "1px solid #d1d9e6" : "none" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <div>
                      <div style={{ fontWeight: 600, color: "#0f172a", fontSize: 14 }}>
                        <span style={{ background: tc.bg, color: tc.color, padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 600, marginRight: 8 }}>{tc.label}</span>
                        vs {opp} {num}
                      </div>
                      <div style={{ fontSize: 11, color: "#64748b", marginTop: 3 }}>3 pairs at {clubName} · 3 pairs at {opp}</div>
                    </div>
                    {opp && <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(opp)}`} target="_blank" rel="noopener noreferrer" style={{ fontSize: 10, color: "#1e40af", textDecoration: "none", background: "#dbeafe", padding: "3px 8px", borderRadius: 5, fontWeight: 600, whiteSpace: "nowrap" }}>Map</a>}
                  </div>
                  <div style={{ display: "flex", height: 28, borderRadius: 6, overflow: "hidden", background: "#e2e8f0", marginBottom: 6 }}>
                    <div style={{ width: `${Math.min(100, (have / 12) * 100)}%`, background: have >= 12 ? "linear-gradient(90deg, #16a34a, #22c55e)" : `linear-gradient(90deg, ${tc.color}, ${tc.color}aa)`, transition: "width 0.3s", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 11, fontWeight: 600 }}>{have}/12</div>
                    {maybeTeam.length > 0 && <div style={{ width: `${(maybeTeam.length / 12) * 100}%`, background: "#8b5cf6", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 10, fontWeight: 600 }}>+{maybeTeam.length}?</div>}
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 11, marginBottom: 10 }}>
                    <div style={{ color: "#64748b" }}>{rangeData ? <span>Hdcp range: <b>{fmtH(rangeData.min)}–{fmtH(rangeData.max)}</b> <span style={{ marginLeft: 8, color: "#0f172a", fontWeight: 600 }}>Avg: {avgHdcp}</span></span> : <span>No players yet</span>}</div>
                    <div>{gap > 0 ? <span style={{ color: "#dc2626", fontWeight: 600 }}>Need {gap} more</span> : <span style={{ color: "#16a34a", fontWeight: 600 }}>Full</span>}{maybeTeam.length > 0 && <span style={{ color: "#8b5cf6", marginLeft: 6 }}>({maybeTeam.length} maybe)</span>}</div>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
                    {teamPlayers.map(p => { const parts = p.name.split(","); const last = parts[0].trim(); const first = (parts[1] || "").trim(); const display = first ? `${first.charAt(0)}. ${last}` : last; return (<span key={p.id} style={{ fontSize: 10, background: tc.bg, color: tc.color, padding: "2px 6px", borderRadius: 4, fontWeight: 600, whiteSpace: "nowrap" }}>{display} ({fmtH(p.courseHdcp)})</span>); })}
                    {maybeTeam.map(p => { const parts = p.name.split(","); const last = parts[0].trim(); const first = (parts[1] || "").trim(); const display = first ? `${first.charAt(0)}. ${last}` : last; return (<span key={p.id} style={{ fontSize: 10, background: "#ede9fe", color: "#8b5cf6", padding: "2px 6px", borderRadius: 4, fontWeight: 600, whiteSpace: "nowrap", fontStyle: "italic" }}>{display} ({fmtH(p.courseHdcp)})?</span>); })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}

      <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
          <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #162d50 100%)", color: ACCENT, padding: "10px 16px", fontSize: 15, fontWeight: 600 }}>Follow-Up Targets</div>
          <div style={{ padding: 16, display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 16 }}>
            {[
              { title: "CONTACTED — Awaiting Reply", filter: p => p.status === "contacted", bg: "#fef9c3", color: "#f59e0b", extra: p => p.contactOwner ? `By: ${p.contactOwner}` : "" },
              { title: "MAYBE — On the Fence", filter: p => p.status === "maybe", bg: "#ede9fe", color: "#8b5cf6", extra: p => "Wks: " + [1,2,3].filter(w => p.availability[w] === "maybe").join(", ") },
              { title: "NOT CONTACTED — Recruits", filter: p => p.status === "not_contacted", bg: "#f1f5f9", color: "#94a3b8", extra: p => "Index: " + p.index },
              { title: "DECLINED — Re-Recruit", filter: p => p.status === "declined", bg: "#fee2e2", color: "#dc2626", extra: p => "Hdcp: " + fmtH(p.courseHdcp) },
            ].map(group => {
              const list = players.filter(group.filter).sort((a, b) => a.courseHdcp - b.courseHdcp);
              return (
                <div key={group.title}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: group.color, marginBottom: 6 }}>{group.title}</div>
                  {list.length === 0 && <div style={{ fontSize: 11, color: "#94a3b8", fontStyle: "italic" }}>None</div>}
                  {list.map(p => {
                    const projIdx = projectTeam(p, overallSplit.thresholds);
                    const ptc = TEAM_COLORS[projIdx] || TEAM_COLORS[0];
                    return (
                      <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 8px", background: group.bg, borderRadius: 6, marginBottom: 3, fontSize: 11 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontWeight: 600, fontSize: 9, padding: "1px 5px", borderRadius: 3, background: ptc.bg, color: ptc.color }}>T{projIdx+1}</span>
                          <span style={{ fontWeight: 600 }}>{p.name} ({fmtH(p.courseHdcp)})</span>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                          <span style={{ color: "#64748b", fontSize: 10 }}>{group.extra(p)}</span>
                          {p.phone && <a href={`tel:${p.phone}`} style={{ fontSize: 12, textDecoration: "none" }}>📞</a>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// ROSTER
// ═══════════════════════════════════════════════════════════════
function Roster({ players, setPlayers, addPlayerWithSync, clubName, userId, schedule }) {
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [sortBy, setSortBy] = useState("handicap");
  const [editingId, setEditingId] = useState(null);
  const overallTC = (schedule && schedule[1]) ? (schedule[1].teamCount || 2) : 2;
  const overallSplit = computeTeamSplit(players, 1, overallTC);
  const filtered = useMemo(() => {
    let list = [...players];
    if (search) list = list.filter(p => p.name.toLowerCase().includes(search.toLowerCase()) || p.ghin.includes(search));
    if (filterStatus !== "all") list = list.filter(p => p.status === filterStatus);
    if (sortBy === "handicap") list.sort((a, b) => a.courseHdcp - b.courseHdcp);
    else if (sortBy === "name") list.sort((a, b) => a.name.localeCompare(b.name));
    else if (sortBy === "status") list.sort((a, b) => a.status.localeCompare(b.status));
    return list;
  }, [players, search, filterStatus, sortBy]);
  const updatePlayer = (id, field, value) => setPlayers(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
  const updateAvail = (id, week, value) => setPlayers(prev => prev.map(p => p.id === id ? { ...p, availability: { ...p.availability, [week]: value } } : p));
  const updateLocPref = (id, week, value) => setPlayers(prev => prev.map(p => p.id === id ? { ...p, locPref: { ...p.locPref, [week]: value } } : p));

  const [uploadMsg, setUploadMsg] = useState(null);

  const handleFileUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const ext = file.name.split(".").pop().toLowerCase();
    try {
      let text = "";
      if (ext === "csv") {
        text = await file.text();
      } else if (ext === "xlsx" || ext === "xls") {
        setUploadMsg("Reading Excel file...");
        const Papa = await import("papaparse");
        // For xlsx we read as text via SheetJS if available, otherwise prompt for csv
        try {
          const XLSX = await import("sheetjs");
          const data = await file.arrayBuffer();
          const wb = XLSX.read(data);
          const ws = wb.Sheets[wb.SheetNames[0]];
          text = XLSX.utils.sheet_to_csv(ws);
        } catch {
          setUploadMsg("Excel parsing not available in this environment. Please export as .csv and re-upload.");
          return;
        }
      }
      if (!text) { setUploadMsg("Could not read file."); return; }
      // Parse CSV
      const parseCSVLine = (line) => { const result = []; let current = ""; let inQuotes = false; for (let i = 0; i < line.length; i++) { const ch = line[i]; if (ch === '"') { if (inQuotes && line[i+1] === '"') { current += '"'; i++; } else { inQuotes = !inQuotes; } } else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ""; } else { current += ch; } } result.push(current.trim()); return result; };
      const lines = text.trim().split("\n").map(l => parseCSVLine(l));
      if (lines.length < 2) { setUploadMsg("File appears empty."); return; }
      const header = lines[0].map(h => h.toLowerCase());
      const nameIdx = header.findIndex(h => h.includes("name") || h.includes("player"));
      const ghinIdx = header.findIndex(h => h.includes("ghin") || h.includes("ghin #"));
      const hdcpIdx = header.findIndex(h => h.includes("hdcp") || h.includes("handicap") || h.includes("course"));
      const indexIdx = header.findIndex(h => h.includes("index"));
      const phoneIdx = header.findIndex(h => h.includes("phone") || h.includes("cell") || h.includes("mobile"));
      const emailIdx = header.findIndex(h => h.includes("email") || h.includes("e-mail"));
      if (nameIdx === -1) { setUploadMsg("Could not find a 'Name' or 'Player' column. Please check the file header row."); return; }
      const newPlayers = lines.slice(1).filter(row => row[nameIdx] && row[nameIdx].trim()).map((row, i) => ({
        name: row[nameIdx] || "Unknown",
        ghin: ghinIdx > -1 ? (row[ghinIdx] || "") : "",
        courseHdcp: hdcpIdx > -1 ? (parseFloat(row[hdcpIdx]) || 15) : 15,
        index: indexIdx > -1 ? (parseFloat(row[indexIdx]) || 15) : 15,
        phone: phoneIdx > -1 ? (row[phoneIdx] || "") : "",
        email: emailIdx > -1 ? (row[emailIdx] || "") : "",
        status: "not_contacted", contactOwner: "", contactDate: "",
        availability: { 1: "no", 2: "no", 3: "no" },
        locPref: { 1: "", 2: "", 3: "" }, notes: "Imported"
      }));
      // Bulk insert to Supabase and reload
      if (clubName && userId) {
        const inserted = await bulkInsertPlayers(newPlayers, clubName, userId);
        const dbPlayers = await loadPlayersFromDb(clubName);
        setPlayers(prev => dbPlayers);
      } else {
        setPlayers(prev => [...prev, ...newPlayers.map((p, i) => ({ ...p, id: Math.max(...prev.map(x => x.id), 0) + i + 1 }))]);
      }
      setUploadMsg(`Imported ${newPlayers.length} players from ${file.name}`);
      setTimeout(() => setUploadMsg(null), 5000);
    } catch (err) {
      setUploadMsg("Error reading file: " + err.message);
    }
    e.target.value = "";
  };

  const addPlayer = async () => {
    const newPlayer = { name: "New, Player", ghin: "", courseHdcp: 15, index: 15.0, phone: "", email: "", status: "not_contacted", contactOwner: "", contactDate: "", availability: { 1: "no", 2: "no", 3: "no" }, locPref: { 1: "", 2: "", 3: "" }, notes: "EDIT ME" };
    if (addPlayerWithSync) {
      const newId = await addPlayerWithSync(newPlayer);
      if (newId) setEditingId(newId);
    } else {
      const newId = Math.max(...players.map(p => p.id), 0) + 1;
      setPlayers(prev => [...prev, { ...newPlayer, id: newId }]);
      setEditingId(newId);
    }
  };

  return (
    <div>
      {/* ROSTER UPLOAD */}
      <div style={{ background: "#fff", borderRadius: 10, border: "1px solid #d1d9e6", padding: "14px 18px", marginBottom: 14, display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: "#0f172a" }}>Update Roster</span>
          <span style={{ fontSize: 11, color: "#64748b" }}>Re-import from .csv or .xlsx to add or update players</span>
        </div>
        <label style={{ padding: "7px 16px", borderRadius: 6, border: "2px dashed #7dd3fc", background: "#f0f9ff", color: "#0f172a", fontWeight: 600, cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", gap: 6 }}>
          📁 Choose File
          <input type="file" accept=".csv,.xlsx,.xls" onChange={handleFileUpload} style={{ display: "none" }} />
        </label>
        <span style={{ fontSize: 10, color: "#94a3b8" }}>Columns: First Name, Last Name, GHIN, Handicap, Index, Phone, Email</span>
        {uploadMsg && <span style={{ fontSize: 12, fontWeight: 600, color: uploadMsg.includes("Error") || uploadMsg.includes("not") ? "#dc2626" : "#16a34a", background: uploadMsg.includes("Error") || uploadMsg.includes("not") ? "#fee2e2" : "#dcfce7", padding: "4px 10px", borderRadius: 6 }}>{uploadMsg}</span>}
      </div>

      <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search by name or GHIN..." style={{ flex: "1 1 200px", padding: "8px 14px", borderRadius: 8, border: "1px solid #c1cad8", fontSize: 13, background: "#f5f7fb", outline: "none" }} />
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ padding: "8px 14px", borderRadius: 8, border: "1px solid #c1cad8", fontSize: 13, background: "#f5f7fb", cursor: "pointer" }}>
          <option value="all">All Statuses</option>
          {Object.entries(STATUS_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)} style={{ padding: "8px 14px", borderRadius: 8, border: "1px solid #c1cad8", fontSize: 13, background: "#f5f7fb", cursor: "pointer" }}>
          <option value="handicap">Sort: Handicap</option>
          <option value="name">Sort: Name</option>
          <option value="status">Sort: Status</option>
        </select>
        <button onClick={addPlayer} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "linear-gradient(135deg, #0f172a, #1e3a5f)", color: ACCENT, fontWeight: 600, cursor: "pointer", fontSize: 13, whiteSpace: "nowrap" }}>+ Add Player</button>
        <div style={{ fontSize: 13, color: "#64748b", display: "flex", alignItems: "center", fontWeight: 600 }}>{filtered.length} of {players.length}</div>
      </div>
      {/* Summary bar */}
      {(() => {
        const statusCounts = {};
        Object.keys(STATUS_CONFIG).forEach(k => statusCounts[k] = 0);
        players.forEach(p => { if (statusCounts[p.status] !== undefined) statusCounts[p.status]++; });
        const wkCounts = [1, 2, 3].map(w => {
          let yes = 0, no = 0, maybe = 0;
          players.forEach(p => { if (p.availability[w] === "yes") yes++; else if (p.availability[w] === "maybe") maybe++; else no++; });
          return { yes, no, maybe };
        });
        return (
          <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
            {/* Status summary */}
            <div style={{ flex: "1 1 auto", background: "#fff", borderRadius: 10, border: "1px solid #d1d9e6", padding: "10px 16px", display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
              <span style={{ fontSize: 11, fontWeight: 600, color: "#64748b" }}>Status:</span>
              {Object.entries(STATUS_CONFIG).map(([k, v]) => (
                <span key={k} style={{ fontSize: 11, fontWeight: 600, padding: "2px 8px", borderRadius: 6, background: v.bg, color: v.color }}>{v.label} {statusCounts[k]}</span>
              ))}
            </div>
            {/* Week availability summary */}
            {[1, 2, 3].map(w => (
              <div key={w} style={{ background: "#fff", borderRadius: 10, border: "1px solid #d1d9e6", padding: "10px 12px", display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: "#64748b" }}>Wk{w}:</span>
                <span style={{ fontSize: 11, fontWeight: 600, color: "#16a34a" }}>{wkCounts[w-1].yes}Y</span>
                <span style={{ fontSize: 11, fontWeight: 600, color: "#dc2626" }}>{wkCounts[w-1].no}N</span>
                <span style={{ fontSize: 11, fontWeight: 600, color: "#8b5cf6" }}>{wkCounts[w-1].maybe}M</span>
              </div>
            ))}
          </div>
        );
      })()}

      <div style={{ background: "#fff", borderRadius: 12, border: "1px solid #d1d9e6", overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
            <thead><tr style={{ background: "linear-gradient(135deg, #0f172a 0%, #162d50 100%)", color: ACCENT }}>
              {["Proj", "Player", "HDCP", "Index", "GHIN", "Contact", "Status", "Wk1", "Wk2", "Wk3", "Loc1", "Loc2", "Loc3", "Notes"].map(h => (
                <th key={h} style={{ padding: "10px 6px", textAlign: "left", fontWeight: 600, fontSize: 10, letterSpacing: 0.5, whiteSpace: "nowrap" }}>{h}</th>
              ))}
            </tr></thead>
            <tbody>
              {filtered.map((p, i) => {
                const s = STATUS_CONFIG[p.status];
                const projIdx = projectTeam(p, overallSplit.thresholds);
                const ptc = TEAM_COLORS[projIdx] || TEAM_COLORS[0];
                return (
                  <tr key={p.id} style={{ background: i % 2 === 0 ? "#fff" : "#f5f7fb", borderBottom: "1px solid #e2e8f0" }}>
                    <td style={{ padding: "6px", textAlign: "center" }}><span style={{ fontSize: 10, fontWeight: 600, padding: "2px 6px", borderRadius: 4, background: ptc.bg, color: ptc.color }}>T{projIdx+1}</span></td>
                    <td style={{ padding: "6px 8px", fontWeight: 600, color: "#0f172a", whiteSpace: "nowrap" }}>
                      {editingId === p.id ? <input value={p.name} onChange={e => updatePlayer(p.id, "name", e.target.value)} style={{ fontSize: 12, padding: "2px 6px", border: "1px solid #38bdf8", borderRadius: 4, width: "100%", background: "#eff6ff", fontWeight: 600 }} />
                        : <span onClick={() => setEditingId(p.id)} style={{ cursor: "pointer" }}>{p.name}</span>}
                    </td>
                    <td style={{ padding: "6px", fontWeight: 600, color: "#0f172a", textAlign: "center" }}>
                      {editingId === p.id ? <input type="number" step="0.1" value={p.courseHdcp} onChange={e => updatePlayer(p.id, "courseHdcp", parseFloat(e.target.value) || 0)} style={{ fontSize: 11, padding: "2px 4px", border: "1px solid #38bdf8", borderRadius: 4, width: 45, background: "#eff6ff", fontWeight: 600, textAlign: "center" }} />
                        : <span onClick={() => setEditingId(p.id)} style={{ cursor: "pointer" }}>{fmtH(p.courseHdcp)}</span>}
                    </td>
                    <td style={{ padding: "6px", color: "#64748b", textAlign: "center" }}>
                      {editingId === p.id ? <input type="number" step="0.1" value={p.index} onChange={e => updatePlayer(p.id, "index", parseFloat(e.target.value) || 0)} style={{ fontSize: 11, padding: "2px 4px", border: "1px solid #38bdf8", borderRadius: 4, width: 45, background: "#eff6ff", textAlign: "center" }} />
                        : <span onClick={() => setEditingId(p.id)} style={{ cursor: "pointer" }}>{p.index}</span>}
                    </td>
                    <td style={{ padding: "6px", color: "#64748b", fontFamily: "monospace", fontSize: 10 }}>
                      {editingId === p.id ? <input value={p.ghin} onChange={e => updatePlayer(p.id, "ghin", e.target.value)} style={{ fontSize: 10, padding: "2px 4px", border: "1px solid #38bdf8", borderRadius: 4, width: 70, background: "#eff6ff", fontFamily: "monospace" }} />
                        : <span onClick={() => setEditingId(p.id)} style={{ cursor: "pointer" }}>{p.ghin}</span>}
                    </td>
                    <td style={{ padding: "4px 6px" }}>
                      <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                        {p.phone && <a href={`tel:${p.phone}`} title={p.phone} style={{ fontSize: 12, textDecoration: "none" }}>📞</a>}
                        {p.email && <a href={`mailto:${p.email}`} title={p.email} style={{ fontSize: 12, textDecoration: "none" }}>✉️</a>}
                        {p.contactOwner && <span style={{ fontSize: 9, color: "#64748b", background: "#f1f5f9", padding: "1px 4px", borderRadius: 3 }}>{p.contactOwner}</span>}
                      </div>
                    </td>
                    <td style={{ padding: "6px" }}><select value={p.status} onChange={e => updatePlayer(p.id, "status", e.target.value)} style={{ fontSize: 10, padding: "2px 4px", borderRadius: 4, border: `1px solid ${s.color}44`, background: s.bg, color: s.color, fontWeight: 600, cursor: "pointer" }}>{Object.entries(STATUS_CONFIG).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}</select></td>
                    {[1, 2, 3].map(w => (<td key={`a${w}`} style={{ padding: "3px 4px", textAlign: "center" }}><select value={p.availability[w]} onChange={e => updateAvail(p.id, w, e.target.value)} style={{ fontSize: 10, padding: "2px 2px", borderRadius: 4, border: `1px solid ${(AVAIL_COLORS[p.availability[w]] || "#ccc")}44`, background: p.availability[w] === "yes" ? "#dcfce7" : p.availability[w] === "maybe" ? "#ede9fe" : "#fee2e2", color: AVAIL_COLORS[p.availability[w]] || "#666", fontWeight: 600, cursor: "pointer", width: 50 }}><option value="no">No</option><option value="yes">Yes</option><option value="maybe">Maybe</option></select></td>))}
                    {[1, 2, 3].map(w => (<td key={`l${w}`} style={{ padding: "3px 4px", textAlign: "center" }}><select value={p.locPref[w]} onChange={e => updateLocPref(p.id, w, e.target.value)} style={{ fontSize: 10, padding: "2px 2px", borderRadius: 4, border: "1px solid #c1cad8", background: "#f5f7fb", cursor: "pointer", width: 42 }}><option value="">-</option><option value="Home">H</option><option value="Away">A</option></select></td>))}
                    <td style={{ padding: "3px 6px" }}>
                      {editingId === p.id ? (
                        <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                          <input value={p.notes} onChange={e => updatePlayer(p.id, "notes", e.target.value)} placeholder="Notes..." style={{ fontSize: 10, padding: "2px 6px", border: "1px solid #38bdf8", borderRadius: 4, flex: 1, background: "#eff6ff" }} />
                          <button onClick={() => setEditingId(null)} style={{ fontSize: 9, padding: "3px 8px", borderRadius: 4, border: "none", background: "#16a34a", color: "#fff", fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>✓ Done</button>
                        </div>
                      ) : <div onClick={() => setEditingId(p.id)} style={{ fontSize: 10, color: p.notes ? "#92400e" : "#ccc", cursor: "pointer", fontStyle: p.notes ? "italic" : "normal", minWidth: 50 }}>{p.notes || "+"}</div>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}
